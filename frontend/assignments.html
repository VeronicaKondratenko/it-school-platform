    <style>

    body{font-family:'Manrope',sans-serif;background:var(--ink);color:#fff;margin:0;}
    .app{display:flex;min-height:100vh;}
    .sidebar{width:260px;background:var(--ink-soft);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .3s;}
    .sidebar-logo{display:flex;align-items:center;gap:.65rem;padding:1.5rem;border-bottom:1px solid var(--border);}
    .sidebar-logo img{height:32px;}
    .sidebar-logo span{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:-.02em;}
    .sidebar-logo span b{color:#3b82f6;font-weight:900;}
    .sidebar-nav{flex:1;padding:1rem .75rem;overflow-y:auto;}
    .sidebar-nav a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;margin-bottom:.2rem;transition:all .2s;}
    .sidebar-nav a:hover{background:rgba(255,255,255,.05);color:#fff;}
    .sidebar-nav a.active{background:rgba(37,99,235,.12);color:#3b82f6;border:1px solid rgba(37,99,235,.2);}
    .sidebar-nav a svg{flex-shrink:0;opacity:.7;}
    .sidebar-nav a.active svg{opacity:1;}
    .sidebar-bottom{padding:.75rem;border-top:1px solid var(--border);}
    .sidebar-bottom a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .2s;}
    .sidebar-bottom a:hover{background:rgba(239,68,68,.1);color:#ef4444;}
    .main-wrap{flex:1;margin-left:260px;min-height:100vh;display:flex;flex-direction:column;}
    .page-banner{background:linear-gradient(135deg,#0d1b4b 0%,#1a1040 60%,var(--ink) 100%);padding:2.5rem 2rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
    .page-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 120% at 40% 0%,rgba(37,99,235,.2),transparent);pointer-events:none;}
    .page-banner h1{font-family:'Unbounded',sans-serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:900;letter-spacing:-.03em;position:relative;z-index:1;color:#fff;}
    .page-banner p{color:var(--muted);font-size:.95rem;margin-top:.35rem;position:relative;z-index:1;}
    .page-body{padding:2rem;flex:1;}
    .mobile-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:300;background:var(--blue);border:none;border-radius:10px;padding:.65rem;cursor:pointer;color:#fff;}
    @media(max-width:768px){
        .sidebar{transform:translateX(-100%);}
        .sidebar.active{transform:translateX(0);}
        .main-wrap{margin-left:0;}
        .page-body{padding:1rem;}
        .mobile-toggle{display:flex;}
    }


    .filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
    .filter-btn{padding:.45rem 1.1rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .2s;}
    .filter-btn.active{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:#3b82f6;}
    .assignments-container{display:flex;flex-direction:column;gap:.85rem;}
    .assignment-card{background:var(--ink-soft);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;transition:all .2s;cursor:pointer;}
    .assignment-card:hover{border-color:rgba(37,99,235,.3);}
    .assignment-card.pending{border-left:3px solid #f59e0b;}
    .assignment-card.submitted{border-left:3px solid #10b981;}
    .assignment-card.overdue{border-left:3px solid #ef4444;}
    .asgn-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.5rem;}
    .asgn-title{font-weight:700;font-size:.95rem;}
    .asgn-meta{display:flex;gap:1rem;font-size:.8rem;color:var(--muted);margin-bottom:.75rem;}
    .asgn-desc{font-size:.85rem;color:var(--muted);line-height:1.55;margin-bottom:.9rem;}
    .asgn-actions{display:flex;gap:.6rem;}
    .status-badge{display:inline-flex;align-items:center;padding:.25rem .75rem;border-radius:999px;font-size:.75rem;font-weight:700;flex-shrink:0;}
    .status-pending{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25);}
    .status-submitted{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.25);}
    .status-overdue{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25);}
    .status-graded{background:rgba(37,99,235,.12);color:#3b82f6;border:1px solid rgba(37,99,235,.25);}
    .loading{display:flex;align-items:center;justify-content:center;gap:.75rem;padding:2rem;color:var(--muted);}
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top:2px solid #3b82f6;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:900;align-items:center;justify-content:center;padding:1rem;}
    .modal.open,.modal.show{display:flex;}
    .modal-box{background:#111827;border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
    .modal-head h2{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:-.02em;}
    .close-btn{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;transition:color .2s;padding:.2rem;}
    .close-btn:hover{color:#fff;}
    .form-textarea{width:100%;padding:.8rem 1rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:.9rem;font-family:'Manrope',sans-serif;min-height:120px;resize:vertical;outline:none;transition:all .2s;}
    .form-textarea:focus{border-color:rgba(37,99,235,.5);}
    .modal-footer-row{display:flex;justify-content:flex-end;gap:.75rem;margin-top:1.25rem;}

    </style>

        (function(){
            var toggle = document.getElementById('mobileToggle');
            var sidebar = document.getElementById('sidebar');
            if(toggle) toggle.addEventListener('click', function(){ sidebar.classList.toggle('active'); });
            document.addEventListener('click', function(e){
                if(window.innerWidth <= 768 && sidebar && !sidebar.contains(e.target) && toggle && !toggle.contains(e.target))
                    sidebar.classList.remove('active');
            });
            var cur = location.pathname.split('/').pop();
            document.querySelectorAll('.sidebar-nav a').forEach(function(a){
                if(a.getAttribute('href') === cur) a.classList.add('active');
            });
        })();
    </script>

    <script>
        let assignments = [];
        let currentFilter = 'all';
        let submitAssignmentId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            const role = typeof getRole === 'function' ? getRole() : null;
            
            if (role !== 'student') {
                window.location.href = 'dashboard.html';
                return;
            }

            redirectIfNotLoggedIn();
            await loadAssignments();
        });

        // Redirect if not logged in
        function redirectIfNotLoggedIn() {
            const token = typeof getToken === 'function' ? getToken() : null;
            if (!token) {
                window.location.href = 'index.html';
            }
        }

        // Load assignments from API
        async function loadAssignments() {
            try {
                const data = await apiGet('/api/assignments') || [];
                assignments = data;
                renderAssignments();
            } catch (error) {
                console.error('Error loading assignments:', error);
                document.getElementById('assignmentsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.55;"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <div class="empty-state-title">Помилка завантаження</div>
                        <div class="empty-state-text">${error.message || 'Не вдалося завантажити завдання'}</div>
                    </div>
                `;
            }
        }

        // Filter assignments
        function filterAssignments(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderAssignments();
        }

        // Get assignment status
        function getAssignmentStatus(assignment) {
            const dueDate = assignment.due_date ? new Date(assignment.due_date) : null;
            const now = new Date();

            if (assignment.submitted) {
                return 'submitted';
            }

            if (dueDate && dueDate < now) {
                return 'overdue';
            }

            return 'pending';
        }

        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return 'Без терміну';
            const date = new Date(dateStr);
            return date.toLocaleDateString('uk-UA', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // Get days left
        function getDaysLeft(dateStr) {
            if (!dateStr) return null;
            const due = new Date(dateStr);
            const now = new Date();
            const diff = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
            return diff;
        }

        // Render assignments
        function renderAssignments() {
            const container = document.getElementById('assignmentsContainer');

            let filtered = assignments;
            if (currentFilter !== 'all') {
                filtered = assignments.filter(a => getAssignmentStatus(a) === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.55;"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
                        <div class="empty-state-title">
                            ${currentFilter === 'all' ? 'Завдань не знайдено' : 'Немає завдань'}
                        </div>
                        <div class="empty-state-text">
                            ${currentFilter === 'submitted' ? 'У вас немає завершених завдань' : 
                              currentFilter === 'overdue' ? 'У вас немає прострочених завдань' :
                              currentFilter === 'pending' ? 'Усі завдання виконані!' :
                              'Ви ще не записані на жодні курси'}
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(a => {
                const status = getAssignmentStatus(a);
                const daysLeft = getDaysLeft(a.due_date);
                const dueText = a.due_date ? `${formatDate(a.due_date)}${daysLeft > 0 ? ` (${daysLeft} днів)` : ''}` : 'Без терміну';

                return `
                    <div class="assignment-card ${status}">
                        <div class="asgn-header">
                            <div class="asgn-title">${a.title}</div>
                            <span class="status-badge status-${status}">
                                ${status === 'submitted' ? 'Відправлено' :
                                  status === 'graded'    ? 'Оцінено' :
                                  status === 'overdue'   ? 'Прострочено' : 
                                  'На виконання'}
                            </span>
                        </div>
                        <div class="asgn-meta">
                            <span>${dueText}</span>
                            <span>${a.discipline_name || 'Курс'}</span>
                            <span>${a.course_name || 'Курс'}</span>
                            ${a.grade_score !== null && a.grade_score !== undefined ? `<span style="color:#10b981;font-weight:700;">${a.grade_score}/100</span>` : ''}
                        </div>
                        <p class="asgn-desc">${a.description || 'Опис відсутній'}</p>
                        ${a.grade_feedback ? `<div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:.6rem .9rem;font-size:.85rem;margin-bottom:.75rem;color:#10b981;">Коментар викладача: ${a.grade_feedback}</div>` : ''}
                        <div class="asgn-actions">
                            <button style="padding:.55rem 1.1rem;background:${a.submission_locked ? 'rgba(255,255,255,.05)' : 'rgba(37,99,235,.85)'};color:#fff;border:1px solid ${a.submission_locked ? 'var(--border)' : 'transparent'};border-radius:8px;font-weight:600;font-size:.88rem;cursor:${a.submission_locked ? 'not-allowed' : 'pointer'};opacity:${a.submission_locked ? '.5' : '1'};font-family:'Manrope',sans-serif;" 
                                ${a.submission_locked ? 'disabled' : `onclick="openSubmitModal(${a.id}, '${a.title.replace(/'/g, "\'")}', '${(a.description || '').replace(/'/g, "\'")}')"`}>
                                ${a.submission_locked ? 'Заблоковано' : (a.submitted ? 'Оновити' : 'Відправити')}
                            </button>
                            ${a.submission_content ? `
                                <button onclick="viewSubmission(${a.id})" 
                                    style="padding:.55rem 1.1rem;background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.25);border-radius:8px;font-weight:600;font-size:.88rem;cursor:pointer;font-family:'Manrope',sans-serif;">
                                    Моя відповідь
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Open submit modal
        function openSubmitModal(assignmentId, title, description) {
            submitAssignmentId = assignmentId;
            const assignment = assignments.find(a => a.id === assignmentId);
            if (assignment && assignment.submission_locked) {
                alert('Відправлення заблоковано. Попросіть викладача виконати reset.');
                return;
            }
            
            // Reset modal to submission form state
            const submitForm = document.getElementById('submitForm');
            if (submitForm) {
                submitForm.style.display = 'block'; // Ensure form is visible
            }
            
            // Clear the display container if it exists (from previous view)
            const displayContainer = document.getElementById('submissionDisplayContainer');
            if (displayContainer) {
                displayContainer.innerHTML = '';
            }
            
            // Populate form fields
            document.getElementById('assignmentNameLabel').textContent = title;
            document.getElementById('assignmentDescriptionPreview').textContent = description;
            document.getElementById('submissionContent').value = '';
            document.getElementById('submissionFile').value = '';
            
            // Show modal
            document.getElementById('submitModal').classList.add('show');
        }

        // Close submit modal
        function closeSubmitModal() {
            try {
                // Hide display container
                const displayContainer = document.getElementById('submissionDisplayContainer');
                if (displayContainer) {
                    displayContainer.innerHTML = '';
                }
                
                // Reset form visibility
                const submitForm = document.getElementById('submitForm');
                if (submitForm) {
                    submitForm.style.display = 'block';
                }
                
                // Hide modal
                document.getElementById('submitModal').classList.remove('show');
                submitAssignmentId = null;
            } catch (error) {
                console.error('Error closing modal:', error);
            }
        }

        // Submit assignment
        async function submitAssignment(event) {
            event.preventDefault();

            const content = document.getElementById('submissionContent').value.trim();
            const fileInput = document.getElementById('submissionFile');
            const fileName = fileInput && fileInput.files && fileInput.files[0] ? fileInput.files[0].name : null;
            if (!content) {
                alert('Будь ласка, введіть вміст завдання');
                return;
            }

            try {
                const response = await apiPost(`/api/assignments/${submitAssignmentId}/submit`, { content, file_name: fileName });
                if (response && (response.success || response.submission_id)) {
                    closeSubmitModal();
                    showToast('Завдання відправлено успішно!');
                    await loadAssignments();
                } else {
                    showToast('Помилка при відправленні', 'error');
                }
            } catch (error) {
                alert('Помилка при відправленні: ' + error.message);
            }
        }

        // View submission details — show in dedicated modal
        function viewSubmission(assignmentId) {
            const a = assignments.find(x => x.id === assignmentId);
            const content = a ? (a.submission_content || '') : '';
            const title = a ? a.title : 'Моя відповідь';

            let m = document.getElementById('viewSubmissionModal');
            if (!m) {
                m = document.createElement('div');
                m.id = 'viewSubmissionModal';
                m.className = 'modal';
                m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
                document.body.appendChild(m);
            }
            m.innerHTML = `<div class="modal-box" style="max-width:600px;">
                <div class="modal-head">
                    <h2>Моя відповідь</h2>
                    <button class="close-btn" onclick="document.getElementById('viewSubmissionModal').classList.remove('open')">✕</button>
                </div>
                <div style="font-size:.82rem;color:var(--muted);margin-bottom:.75rem;">${title}</div>
                <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:1rem;white-space:pre-wrap;word-break:break-all;font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.7;max-height:350px;overflow-y:auto;color:rgba(255,255,255,.85);">
                    ${content ? content.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '<em style="color:var(--muted)">Текст відповіді відсутній</em>'}
                </div>
                ${a && a.grade_score !== null && a.grade_score !== undefined ? `
                <div style="margin-top:.85rem;padding:.75rem 1rem;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;">
                    <div style="font-size:.82rem;color:#10b981;font-weight:700;">Оцінка: ${a.grade_score}/100</div>
                    ${a.grade_feedback ? `<div style="font-size:.8rem;color:rgba(255,255,255,.6);margin-top:.25rem;">${a.grade_feedback}</div>` : ''}
                </div>` : ''}
                <div class="modal-footer-row">
                    <button class="close-btn" style="padding:.6rem 1.2rem;border:1px solid var(--border);border-radius:8px;font-size:.85rem;" onclick="document.getElementById('viewSubmissionModal').classList.remove('open')">Закрити</button>
                </div>
            </div>`;
            m.classList.add('open');
        }

        // Logout
        function logout() {
            if (typeof clearAuth === 'function') {
                clearAuth();
            }
            window.location.href = '/index.html';
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('submitModal');
            if (event.target === modal) {
                closeSubmitModal();
            }
        };
    </script>
</body>
</html>
