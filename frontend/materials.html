<html lang="uk">
<head>
    <script>(function(){try{var t=localStorage.getItem('it-school-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
    <meta charset="UTF-8">

    <title>Матеріали — IT School</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>

    body{font-family:'Manrope',sans-serif;background:var(--ink);color:#fff;margin:0;}
    .app{display:flex;min-height:100vh;}
    .sidebar{width:260px;background:var(--ink-soft);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .3s;}
    .sidebar-logo{display:flex;align-items:center;gap:.65rem;padding:1.5rem;border-bottom:1px solid var(--border);}
    .sidebar-logo img{height:32px;}
    .sidebar-logo span{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:-.02em;}
    .sidebar-logo span b{color:#3b82f6;font-weight:900;}
    .sidebar-nav{flex:1;padding:1rem .75rem;overflow-y:auto;}
    .sidebar-nav a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;margin-bottom:.2rem;transition:all .2s;}
    .sidebar-nav a:hover{background:rgba(255,255,255,.05);color:#fff;}
    .sidebar-nav a.active{background:rgba(37,99,235,.12);color:#3b82f6;border:1px solid rgba(37,99,235,.2);}
    .sidebar-nav a svg{flex-shrink:0;opacity:.7;}
    .sidebar-nav a.active svg{opacity:1;}
    .sidebar-bottom{padding:.75rem;border-top:1px solid var(--border);}
    .sidebar-bottom a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .2s;}
    .sidebar-bottom a:hover{background:rgba(239,68,68,.1);color:#ef4444;}
    .main-wrap{flex:1;margin-left:260px;min-height:100vh;display:flex;flex-direction:column;}
    .page-banner{background:linear-gradient(135deg,#0d1b4b 0%,#1a1040 60%,var(--ink) 100%);padding:2.5rem 2rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
    .page-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 120% at 40% 0%,rgba(37,99,235,.2),transparent);pointer-events:none;}
    .page-banner h1{font-family:'Unbounded',sans-serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:900;letter-spacing:-.03em;position:relative;z-index:1;color:#fff;}
    .page-banner p{color:var(--muted);font-size:.95rem;margin-top:.35rem;position:relative;z-index:1;}
    .page-body{padding:2rem;flex:1;}
    .mobile-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:300;background:var(--blue);border:none;border-radius:10px;padding:.65rem;cursor:pointer;color:#fff;}
    @media(max-width:768px){
        .sidebar{transform:translateX(-100%);}
        .sidebar.active{transform:translateX(0);}
        .main-wrap{margin-left:0;}
        .page-body{padding:1rem;}
        .mobile-toggle{display:flex;}
    }


    .mat-layout{display:grid;grid-template-columns:240px 1fr;gap:1.5rem;}
    .mat-sidebar{background:var(--ink-soft);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    .mat-sidebar h3{padding:1.1rem 1.25rem;font-size:.85rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
    .mat-course-list{list-style:none;padding:.5rem;}
    .mat-course-item{display:flex;align-items:center;gap:.65rem;padding:.75rem 1rem;border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:.15rem;}
    .mat-course-item:hover{background:rgba(255,255,255,.05);}
    .mat-course-item.active{background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.2);}
    .mat-course-name{font-size:.88rem;font-weight:600;}
    .mat-course-item.active .mat-course-name{color:#3b82f6;}
    .mat-course-count{font-size:.75rem;color:var(--muted);}
    .mat-main{display:flex;flex-direction:column;gap:1rem;}
    .mat-search{position:relative;}
    .mat-search input{width:100%;padding:.75rem 1rem .75rem 2.75rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:.9rem;font-family:'Manrope',sans-serif;outline:none;transition:all .2s;}
    .mat-search input:focus{border-color:rgba(37,99,235,.5);}
    .mat-search input::placeholder{color:var(--muted);}
    .mat-search svg{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);}
    .mat-filters{display:flex;gap:.5rem;flex-wrap:wrap;}
    .mat-filter{padding:.4rem 1rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .2s;}
    .mat-filter.active{background:rgba(37,99,235,.12);border-color:rgba(37,99,235,.35);color:#3b82f6;}
    .materials-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
    .mat-card{background:var(--ink-soft);border:1px solid var(--border);border-radius:14px;padding:1.25rem;transition:all .3s;cursor:pointer;}
    .mat-card:hover{border-color:rgba(37,99,235,.3);transform:translateY(-2px);}
    .mat-type-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:.85rem;}
    .mat-name{font-weight:700;font-size:.9rem;margin-bottom:.35rem;}
    .mat-meta{font-size:.78rem;color:var(--muted);}
    @media(max-width:900px){.mat-layout{grid-template-columns:1fr;}}

    </style>

    <script>
        (function(){
            var toggle = document.getElementById('mobileToggle');
            var sidebar = document.getElementById('sidebar');
            if(toggle) toggle.addEventListener('click', function(){ sidebar.classList.toggle('active'); });
            document.addEventListener('click', function(e){
                if(window.innerWidth <= 768 && sidebar && !sidebar.contains(e.target) && toggle && !toggle.contains(e.target))
                    sidebar.classList.remove('active');
            });
            // Mark active nav link
            var cur = location.pathname.split('/').pop();
            document.querySelectorAll('.sidebar-nav a').forEach(function(a){
                if(a.getAttribute('href') === cur) a.classList.add('active');
            });
        })();
    </script>
    <script src="config.js"></script>

    <script src="api.js"></script>
    <script>
        let allCourses = [];
        let currentTopics = [];
        let currentMaterials = [];
        let currentFilter = 'all';
        let currentSearch = '';

        window.addEventListener('load', async () => {
            if (!requireAuth()) return;
            showDemoBanner();
            await loadCourses();
            // Search
            const si = document.getElementById('materialSearch');
            if (si) si.addEventListener('input', e => {
                currentSearch = e.target.value.toLowerCase();
                renderTopics();
            });
        });

        async function loadCourses() {
            const list = document.getElementById('matCourseList');
            try {
                const courses = await apiGet('/api/student/courses') || [];
                allCourses = courses;
                if (!courses.length) {
                    list.innerHTML = '<li style="padding:.75rem 1rem;color:var(--muted);font-size:.82rem;">Немає записаних курсів</li>';
                    showEmpty('Ви ще не записані на жоден курс');
                    return;
                }
                list.innerHTML = courses.map((c, i) => `
                    <li class="mat-course-item ${i===0?'active':''}" onclick="selectCourse(${c.course_id}, this)">
                        <div>
                            <div class="mat-course-name">${c.course_title}</div>
                            <div class="mat-course-count">${c.grades_count || 0} завдань</div>
                        </div>
                    </li>`).join('');
                if (courses.length > 0) await selectCourse(courses[0].course_id);
            } catch(e) {
                list.innerHTML = `<li style="padding:.75rem 1rem;color:var(--red);font-size:.82rem;">${e.message}</li>`;
            }
        }

        async function selectCourse(courseId, el) {
            document.querySelectorAll('.mat-course-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');
            const grid = document.getElementById('materialsGrid');
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);">Завантаження...</div>';
            try {
                const [topics, materials] = await Promise.all([
                    apiGet(`/api/courses/${courseId}/topics`).catch(() => []),
                    apiGet(`/api/courses/${courseId}/materials`).catch(() => [])
                ]);
                currentTopics = topics || [];
                currentMaterials = materials || [];
                renderTopics();
            } catch(e) {
                showEmpty('Помилка: ' + e.message);
            }
        }

        function renderTopics() {
            const grid = document.getElementById('materialsGrid');
            const q = currentSearch;
            let topics = currentTopics;
            let materials = currentMaterials;
            if (q) {
                topics = topics.filter(t =>
                    (t.title||'').toLowerCase().includes(q) ||
                    (t.discipline_name||'').toLowerCase().includes(q)
                );
                materials = materials.filter(m =>
                    (m.title||'').toLowerCase().includes(q) ||
                    (m.body||'').toLowerCase().includes(q)
                );
            }
            if (!topics.length && !materials.length) {
                showEmpty('Матеріалів не знайдено');
                return;
            }
            const esc = (t) => String(t == null ? '' : t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const SVG = {
                document: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
                video: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>',
                link: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
                topic: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
            };
            const typeIcons = {'video':SVG.video,'document':SVG.document,'link':SVG.link,'topic':SVG.topic};

            const materialCards = materials.map(m => `
                <div class="mat-card" onclick="openMaterial(${m.id})">
                    <div class="mat-type-icon" style="background:rgba(16,185,129,.12);">${SVG.document}</div>
                    <div class="mat-name">${esc(m.title) || 'Матеріал'}</div>
                    <div class="mat-meta">Навчальний матеріал</div>
                </div>`).join('');

            const topicCards = topics.map(t => {
                const icon = typeIcons[t.type] || SVG.topic;
                return `
                <div class="mat-card" onclick="openTopic(${t.id}, '${(t.title||'').replace(/'/g,"\'")}', '${(t.discipline_name||'').replace(/'/g,"\'")}')">
                    <div class="mat-type-icon" style="background:rgba(37,99,235,.1);">${icon}</div>
                    <div class="mat-name">${t.title || 'Тема'}</div>
                    <div class="mat-meta">${t.discipline_name || 'Курс'}</div>
                </div>`;
            }).join('');

            grid.innerHTML = materialCards + topicCards;
        }

        function openMaterial(id) {
            const m = currentMaterials.find(x => x.id === id);
            if (!m) return;
            const esc = (t) => String(t == null ? '' : t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            let modal = document.getElementById('topicModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'topicModal';
                modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:2500;padding:1rem;';
                modal.addEventListener('click', e => { if (e.target === modal) modal.style.display='none'; });
                document.body.appendChild(modal);
            }
            const body = m.body || '';
            const linkify = (raw) => esc(raw).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#3b82f6;">$1</a>');
            modal.innerHTML = `<div style="background:var(--ink-soft);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;padding:1.75rem;max-height:80vh;overflow-y:auto;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;">
                    <div style="font-family:'Unbounded',sans-serif;font-size:1.05rem;font-weight:700;">${esc(m.title)}</div>
                    <button onclick="document.getElementById('topicModal').style.display='none'" style="background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1;">✕</button>
                </div>
                <div style="background:var(--ink);border:1px solid var(--border);border-radius:10px;padding:1rem;font-size:.9rem;line-height:1.6;color:rgba(255,255,255,.85);white-space:pre-wrap;word-break:break-word;">
                    ${body ? linkify(body) : 'Без додаткового опису.'}
                </div>
            </div>`;
            modal.style.display = 'flex';
        }

        function openTopic(id, title, discipline) {
            let m = document.getElementById('topicModal');
            if (!m) {
                m = document.createElement('div');
                m.id = 'topicModal';
                m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:2500;padding:1rem;';
                m.addEventListener('click', e => { if (e.target === m) m.style.display='none'; });
                document.body.appendChild(m);
            }
            m.innerHTML = `<div style="background:var(--ink-soft);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;padding:1.75rem;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;">
                    <div>
                        <div style="font-family:'Unbounded',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:.25rem;">${title}</div>
                        <div style="font-size:.82rem;color:var(--muted);">${discipline}</div>
                    </div>
                    <button onclick="document.getElementById('topicModal').style.display='none'" style="background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1;">✕</button>
                </div>
                <div style="background:var(--ink);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem;">
                    <div style="font-size:.82rem;color:var(--muted);margin-bottom:.5rem;">Тема #${id}</div>
                    <div style="font-size:.88rem;line-height:1.6;color:rgba(255,255,255,.8);">
                        Детальні матеріали (лекції, методички, відео) для цієї теми доступні у розділі <strong>Курси → ${title}</strong>.
                    </div>
                </div>
                <a href="courses.html" style="display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.2rem;background:rgba(37,99,235,.85);color:#fff;border-radius:9px;font-weight:600;font-size:.88rem;text-decoration:none;">Перейти до курсу</a>
            </div>`;
            m.style.display = 'flex';
        }

        function filterMaterials(type) {
            currentFilter = type;
            document.querySelectorAll('.mat-filter').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTopics();
        }

        function showEmpty(msg) {
            document.getElementById('materialsGrid').innerHTML =
                `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted);">
                    <div style="font-size:2rem;margin-bottom:.5rem;"></div>
                    <div>${msg}</div>
                </div>`;
        }

        function logout() {
            if (typeof clearAuth === 'function') clearAuth();
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
