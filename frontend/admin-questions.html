<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Звернення — IT School Admin</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@600;700;800&display=swap" rel="stylesheet"><style>
:root{--bg:#0b1020;--ink-soft:#151b2e;--card:#151b2e;--text:#f8fafc;--muted:#94a3b8;--border:rgba(148,163,184,.18);--blue:#2563eb;--green:#10b981;--orange:#f59e0b;--red:#ef4444}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Manrope,sans-serif;background:var(--bg);color:var(--text)}.app{display:flex}.sidebar{width:260px;background:var(--ink-soft);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column}.sidebar-logo{display:flex;align-items:center;gap:.65rem;padding:1.5rem;border-bottom:1px solid var(--border)}.sidebar-logo img{height:32px}.sidebar-logo span{font-family:Unbounded,sans-serif;font-weight:800}.sidebar-logo b{color:#3b82f6}.profile{padding:1.2rem;text-align:center;border-bottom:1px solid var(--border)}.avatar{width:58px;height:58px;margin:0 auto .6rem;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#8b5cf6,#7c3aed);font-weight:900}.sidebar-nav{padding:.75rem;flex:1}.sidebar-nav a{display:flex;padding:.78rem 1rem;border-radius:12px;color:var(--muted);text-decoration:none;font-weight:700;margin-bottom:.2rem}.sidebar-nav a:hover{background:rgba(255,255,255,.05);color:#fff}.sidebar-nav a.active{background:rgba(37,99,235,.14);border:1px solid rgba(37,99,235,.25);color:#60a5fa}.sidebar-bottom{padding:.75rem;border-top:1px solid var(--border)}.sidebar-bottom a{color:var(--muted);text-decoration:none}.main{margin-left:260px;flex:1;padding:2rem}.head{display:flex;justify-content:space-between;gap:1rem;margin-bottom:1.5rem}.head h1{font-family:Unbounded,sans-serif;font-size:1.55rem;margin-bottom:.35rem}.head p,.meta{color:var(--muted);line-height:1.5}.stats{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:1rem;margin-bottom:1rem}.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem}.stat strong{font-family:Unbounded,sans-serif;font-size:1.4rem}.layout{display:grid;grid-template-columns:minmax(480px,1fr) minmax(400px,520px);gap:1rem}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.25rem}.tabs{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1rem}.tab{border:1px solid var(--border);background:rgba(148,163,184,.08);color:#cbd5e1;border-radius:999px;padding:.52rem .85rem;cursor:pointer;font-weight:800}.tab.active{background:rgba(37,99,235,.16);border-color:rgba(37,99,235,.45);color:#60a5fa}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:16px}table{width:100%;border-collapse:collapse;min-width:760px}th,td{text-align:left;padding:.85rem;border-bottom:1px solid var(--border);font-size:.85rem}th{color:#cbd5e1;background:rgba(15,23,42,.7)}tr{cursor:pointer}tr:hover{background:rgba(37,99,235,.07)}.badge{border-radius:999px;padding:.18rem .55rem;font-size:.7rem;font-weight:900;display:inline-flex}.b-new{background:rgba(37,99,235,.16);color:#60a5fa}.b-waiting_answer{background:rgba(245,158,11,.16);color:#fbbf24}.b-answered{background:rgba(16,185,129,.16);color:#34d399}.b-closed{background:rgba(148,163,184,.16);color:#cbd5e1}.b-high{background:rgba(239,68,68,.18);color:#f87171}.message{padding:.85rem;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04);margin:.65rem 0}.who{font-size:.8rem;color:#93c5fd;font-weight:900;margin-bottom:.25rem}textarea,select{width:100%;background:#0f172a;color:#fff;border:1px solid var(--border);border-radius:12px;padding:.8rem;font:inherit}textarea{min-height:110px;resize:vertical}.btn{border:0;border-radius:12px;background:var(--blue);color:#fff;padding:.78rem 1rem;font-weight:900;cursor:pointer}.btn.secondary{background:rgba(148,163,184,.12);border:1px solid var(--border);color:#e2e8f0}.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.7rem}.empty{text-align:center;color:var(--muted);padding:2rem;border:1px dashed var(--border);border-radius:16px}.toast{position:fixed;right:1rem;bottom:1rem;background:#0f172a;color:#fff;border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;z-index:6000}@media(max-width:1050px){.sidebar{display:none}.main{margin-left:0;padding:1rem}.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style><link rel="stylesheet" href="professional-ui.css"><link rel="stylesheet" href="theme-light.css"><link rel="stylesheet" href="ui-system.css"></head><body><div class="app"><aside class="sidebar"><div class="sidebar-logo"><img src="assets/logo-code-mark.png"><span>IT&nbsp;<b>School</b></span></div><div class="profile"><div class="avatar" id="avatar">А</div><div id="userName">Адміністратор</div><div class="meta">Адмін</div></div><nav class="sidebar-nav"><a href="admin-dashboard.html">Панель адміністратора</a><a class="active" href="admin-questions.html">Звернення</a></nav><div class="sidebar-bottom"><a href="#" onclick="logout();return false;">Вийти</a></div></aside><main class="main"><div class="head"><div><h1>Звернення та AI-запити</h1><p>Адміністратор бачить звернення до адміністрації, питання до викладачів і журнал AI-запитів студентів.</p></div><button class="btn secondary" onclick="loadThreads()">Оновити</button></div><div class="stats"><div class="stat"><strong id="sAll">0</strong><div class="meta">Усі</div></div><div class="stat"><strong id="sAdmin">0</strong><div class="meta">До адміна</div></div><div class="stat"><strong id="sTeacher">0</strong><div class="meta">До викладачів</div></div><div class="stat"><strong id="sAI">0</strong><div class="meta">AI-запити</div></div></div><div class="layout"><section class="card"><div class="tabs"><button class="tab active" data-filter="all">Усі</button><button class="tab" data-filter="admin">До адміна</button><button class="tab" data-filter="teacher">До викладачів</button><button class="tab" data-filter="ai">AI-запити</button><button class="tab" data-filter="open">Відкриті</button></div><div class="table-wrap"><table><thead><tr><th>Студент</th><th>Тип</th><th>Курс</th><th>Тема</th><th>Статус</th><th>Дата</th></tr></thead><tbody id="tbody"></tbody></table></div></section><section class="card" id="detail"><div class="empty">Оберіть звернення.</div></section></div></main></div><script src="config.js"></script><script src="mockData.js"></script><script src="api.js"></script><script>
if(!requireAuth()) throw new Error('auth'); if(getRole()!=='admin'){ location.href='index.html'; }
let threads=[]; let filter='all'; const labels={new:'Нове',waiting_answer:'Очікує відповіді',answered:'Відповідь надано',closed:'Закрито'}; const typeLabels={admin:'Адміністратор',teacher:'Викладач',ai:'AI'};function toast(t){const d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2500)}function calcStats(){sAll.textContent=threads.length;sAdmin.textContent=threads.filter(x=>x.target_type==='admin').length;sTeacher.textContent=threads.filter(x=>x.target_type==='teacher').length;sAI.textContent=threads.filter(x=>x.target_type==='ai').length}
function render(){calcStats();let rows=threads;if(filter==='open')rows=rows.filter(x=>x.status!=='closed'&&x.target_type!=='ai');else if(filter!=='all')rows=rows.filter(x=>x.target_type===filter);const tb=document.getElementById('tbody');if(!rows.length){tb.innerHTML='<tr><td colspan="6"><div class="empty">Даних немає.</div></td></tr>';return}tb.innerHTML=rows.map(q=>`<tr onclick="openThread(${q.id})"><td>${escapeHtml(q.student_name||q.student_email||'Студент')}</td><td>${typeLabels[q.target_type]||q.target_type} ${q.priority==='high'?'<span class="badge b-high">!</span>':''}</td><td>${escapeHtml(q.course_title||'—')}</td><td>${escapeHtml(q.title)}</td><td><span class="badge b-${q.status}">${labels[q.status]||q.status}</span></td><td>${new Date(q.created_at).toLocaleDateString('uk-UA')}</td></tr>`).join('')}
async function loadThreads(){try{threads=await apiGet('/api/questions/admin')||[];render()}catch(e){tbody.innerHTML=`<tr><td colspan="6"><div class="empty">${escapeHtml(e.message)}</div></td></tr>`}}
async function openThread(id){const q=await apiGet(`/api/questions/${id}`);document.getElementById('detail').innerHTML=`<h2>${escapeHtml(q.title)}</h2><div class="meta">${escapeHtml(q.student_name||q.student_email||'Студент')} · ${typeLabels[q.target_type]||q.target_type} · ${escapeHtml(q.course_title||'Без курсу')} · ${labels[q.status]||q.status}</div><div style="margin:1rem 0">${(q.messages||[]).map(m=>`<div class="message"><div class="who">${escapeHtml(m.sender_name||m.sender_role)} · ${new Date(m.created_at).toLocaleString('uk-UA')}</div><div>${escapeHtml(m.message_text)}</div></div>`).join('')}</div>${q.target_type!=='ai'&&q.status!=='closed'?`<textarea id="replyText" placeholder="Відповідь студенту..."></textarea><div class="btn-row"><button class="btn" onclick="sendReply(${q.id})">Відповісти</button><button class="btn secondary" onclick="closeThread(${q.id})">Закрити</button></div>`: q.target_type==='ai'?'<div class="empty">Це історія AI-запиту. Відповідь уже надана асистентом.</div>':'<div class="empty">Звернення закрито.</div>'}`}
async function sendReply(id){const t=document.getElementById('replyText').value.trim();if(!t)return toast('Введіть відповідь');await replyQuestion(id,t);toast('Відповідь надіслано');await loadThreads();await openThread(id)}async function closeThread(id){await closeQuestion(id);toast('Закрито');await loadThreads();await openThread(id)}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;render()}));fetchCurrentUser().then(u=>{userName.textContent=u.full_name||u.email;avatar.textContent=(u.full_name||u.email||'А').trim()[0].toUpperCase()}).catch(()=>{});loadThreads();
</script></body></html>
