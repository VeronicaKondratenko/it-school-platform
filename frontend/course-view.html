<!DOCTYPE html>
<html lang="uk">
<head>
    <script>(function(){try{var t=localStorage.getItem('it-school-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo-code-mark-128.png">
    <title>Перегляд курсу — IT School</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
    body{font-family:'Manrope',sans-serif;background:var(--ink);color:#fff;margin:0;}
    .app{display:flex;min-height:100vh;}
    .sidebar{width:260px;background:var(--ink-soft);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .3s;}
    .sidebar-logo{display:flex;align-items:center;gap:.65rem;padding:1.5rem;border-bottom:1px solid var(--border);}
    .sidebar-logo img{height:32px;}
    .sidebar-logo span{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:-.02em;}
    .sidebar-logo span b{color:#3b82f6;font-weight:900;}
    .sidebar-nav{flex:1;padding:1rem .75rem;overflow-y:auto;}
    .sidebar-nav a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;margin-bottom:.2rem;transition:all .2s;}
    .sidebar-nav a:hover{background:rgba(255,255,255,.05);color:#fff;}
    .sidebar-nav a.active{background:rgba(37,99,235,.12);color:#3b82f6;border:1px solid rgba(37,99,235,.2);}
    .sidebar-nav a svg{flex-shrink:0;opacity:.7;}
    .sidebar-nav a.active svg{opacity:1;}
    .sidebar-bottom{padding:.75rem;border-top:1px solid var(--border);}
    .sidebar-bottom a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .2s;cursor:pointer;}
    .sidebar-bottom a:hover{background:rgba(239,68,68,.1);color:#ef4444;}
    .main-wrap{flex:1;margin-left:260px;min-height:100vh;display:flex;flex-direction:column;}
    .course-hero{background:linear-gradient(135deg,#0d1b4b 0%,#1a1040 60%,var(--ink) 100%);padding:2.5rem 2rem 0;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
    .course-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 120% at 40% 0%,rgba(37,99,235,.2),transparent);pointer-events:none;}
    .course-hero-content{position:relative;z-index:1;}
    .course-hero h1{font-family:'Unbounded',sans-serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:900;letter-spacing:-.03em;margin-bottom:.65rem;}
    .course-hero-meta{display:flex;gap:1rem;flex-wrap:wrap;font-size:.85rem;color:var(--muted);margin-bottom:1rem;}
    .course-hero-meta span{display:flex;align-items:center;gap:.35rem;}
    .course-desc-hero{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem;max-width:700px;}
    .course-tabs{display:flex;gap:.25rem;}
    .tab-btn{padding:.75rem 1.4rem;border:none;background:transparent;color:var(--muted);font-size:.875rem;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
    .tab-btn.active{color:#3b82f6;border-bottom-color:#3b82f6;}
    .tab-btn:hover{color:#fff;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    .course-body{padding:1.75rem 2rem;flex:1;}
    .course-layout{display:grid;grid-template-columns:1fr 300px;gap:1.5rem;}
    .course-sidebar-card{background:var(--ink-soft);border:1px solid var(--border);border-radius:14px;padding:1.5rem;position:sticky;top:1.5rem;}
    .course-sidebar-card h3{font-weight:700;font-size:.78rem;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;}
    .assignments-list{display:flex;flex-direction:column;gap:.75rem;}
    .assignment-item{background:var(--ink-soft);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.3rem;transition:border-color .2s;}
    .assignment-item:hover{border-color:rgba(37,99,235,.35);}
    .assignment-item.submitted{border-left:3px solid #10b981;}
    .assignment-item.overdue{border-left:3px solid #ef4444;}
    .assignment-item.upcoming{border-left:3px solid #f59e0b;}
    .assignment-title{font-weight:700;font-size:.95rem;color:#fff;}
    .assignment-meta{display:flex;gap:.75rem;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin-bottom:.5rem;}
    .assignment-desc{font-size:.85rem;color:rgba(255,255,255,.65);line-height:1.5;margin-bottom:.85rem;white-space:pre-wrap;}
    .assignment-actions{display:flex;gap:.5rem;flex-wrap:wrap;}
    .cv-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .2s;}
    .cv-btn:hover{background:rgba(255,255,255,.13);}
    .cv-btn.primary{background:rgba(37,99,235,.85);border-color:transparent;}
    .cv-btn.primary:hover{background:#2563eb;}
    .cv-btn.success{background:rgba(16,185,129,.12);color:#10b981;border-color:rgba(16,185,129,.25);}
    .cv-btn.success:hover{background:rgba(16,185,129,.2);}
    .grade-pill{display:inline-flex;align-items:center;padding:.25rem .65rem;border-radius:999px;font-size:.75rem;font-weight:700;}
    .grade-pill.green{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.25);}
    .grade-pill.blue{background:rgba(37,99,235,.12);color:#3b82f6;border:1px solid rgba(37,99,235,.25);}
    .grade-pill.yellow{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25);}
    .mat-item{background:var(--ink);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;display:flex;align-items:center;gap:.85rem;transition:border-color .2s;}
    .mat-item:hover{border-color:rgba(37,99,235,.3);}
    .mat-item-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;background:rgba(37,99,235,.1);}
    .disc-label{font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.65rem;}
    .student-row{display:flex;align-items:center;gap:.85rem;padding:.85rem 1.1rem;background:var(--ink);border:1px solid var(--border);border-radius:10px;margin-bottom:.5rem;}
    .student-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0;text-transform:uppercase;}
    .lesson-link{display:block;padding:.6rem .85rem;background:var(--ink);border:1px solid var(--border);border-radius:8px;color:#3b82f6;text-decoration:none;font-size:.85rem;margin-bottom:.4rem;transition:all .2s;}
    .lesson-link:hover{border-color:rgba(37,99,235,.4);background:rgba(37,99,235,.05);}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
    .loading{display:flex;align-items:center;justify-content:center;gap:.75rem;padding:2rem;color:var(--muted);}
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top:2px solid #3b82f6;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .cv-input{width:100%;padding:.7rem 1rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:9px;color:#fff;font-family:'Manrope',sans-serif;font-size:.88rem;outline:none;}
    .cv-input:focus{border-color:rgba(37,99,235,.5);}
    .cv-textarea{width:100%;min-height:140px;padding:.8rem 1rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:#fff;font-family:'Manrope',sans-serif;font-size:.9rem;resize:vertical;outline:none;}
    .cv-textarea:focus{border-color:rgba(37,99,235,.5);}
    .cv-form-label{display:block;font-weight:600;font-size:.85rem;margin-bottom:.4rem;}
    .cv-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:2500;padding:1rem;}
    .cv-modal.open{display:flex;}
    .cv-modal-box{background:var(--ink-soft);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:1.75rem;animation:cvSlide .25s ease;}
    @keyframes cvSlide{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .cv-modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;}
    .cv-modal-head h2{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:-.02em;margin:0;}
    .cv-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1;}
    .cv-close:hover{color:#fff;}
    .cv-code{background:var(--ink);border:1px solid var(--border);border-radius:10px;padding:1rem;font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.7;white-space:pre-wrap;word-break:break-all;color:rgba(255,255,255,.85);overflow-y:auto;}
    .cv-footer{display:flex;justify-content:flex-end;gap:.6rem;margin-top:1.25rem;}
    .mobile-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:300;background:var(--blue);border:none;border-radius:10px;padding:.65rem;cursor:pointer;color:#fff;}
    @media(max-width:1024px){.course-layout{grid-template-columns:1fr;}}
    @media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.active{transform:translateX(0);}.main-wrap{margin-left:0;}.course-hero{padding:1.5rem 1rem 0;}.course-body{padding:1.25rem 1rem;}.mobile-toggle{display:flex;}}
    </style>

<script>
    (function(){
        var toggle=document.getElementById('mobileToggle');
        var sidebar=document.getElementById('sidebar');
        if(toggle) toggle.addEventListener('click',function(){sidebar.classList.toggle('active');});
        document.addEventListener('click',function(e){
            if(window.innerWidth<=768 && sidebar && !sidebar.contains(e.target) && toggle && !toggle.contains(e.target))
                sidebar.classList.remove('active');
        });
    })();
</script>
<script src="config.js"></script>
<script src="mockData.js"></script>
<script src="api.js"></script>
<script>

        let courseId = null;
        let courseData = null;
        let assignments = [];

        // ── INIT ────────────────────────────────────────────────────
        window.addEventListener('load', async () => {
            if (typeof requireAuth === 'function' && !requireAuth()) return;
            if (typeof showDemoBanner === 'function') showDemoBanner();

            const role = typeof getRole === 'function' ? getRole() : null;
            // role-based tab visibility
            document.querySelectorAll('.teacher-only').forEach(el => el.style.display = role === 'teacher' ? '' : 'none');
            document.querySelectorAll('.student-only').forEach(el => el.style.display = role === 'teacher' ? 'none' : '');

            const params = new URLSearchParams(window.location.search);
            courseId = params.get('id');
            if (!courseId) { window.location.href = 'courses.html'; return; }

            await loadCourseData();
        });

        async function loadCourseData() {
            try {
                const courses = await apiGet('/api/courses');
                courseData = (courses || []).find(c => c.id === parseInt(courseId));
                if (!courseData) {
                    document.getElementById('courseTitle').textContent = 'Курс не знайдено';
                    document.getElementById('assignmentsContent').innerHTML =
                        '<div class="empty-state"><div style="font-size:2rem;"></div><div>Курс не існує або у вас немає доступу</div></div>';
                    return;
                }
                document.getElementById('courseTitle').textContent = courseData.title;
                document.getElementById('courseDescription').textContent = courseData.description || '';

                await loadAssignments();
                await loadCourseMeta();
                await renderSidebar();
            } catch (e) {
                document.getElementById('assignmentsContent').innerHTML =
                    `<div class="empty-state"><div style="font-size:2rem;"></div><div>Помилка: ${e.message}</div></div>`;
            }
        }

        async function loadCourseMeta() {
            try {
                const role = typeof getRole === 'function' ? getRole() : null;
                if (role === 'teacher') {
                    const students = await apiGet('/api/teacher/students') || [];
                    document.getElementById('courseStudents').textContent = students.length + ' студентів';
                } else {
                    const courses = await apiGet('/api/student/courses') || [];
                    const cd = courses.find(c => c.course_id === parseInt(courseId));
                    document.getElementById('courseStudents').textContent = (cd?.enrolled_students_count || 0) + ' студентів';
                }
            } catch(e) {}
            document.getElementById('courseAssignments').textContent = assignments.length + ' завдань';
        }

        // ── ASSIGNMENTS ─────────────────────────────────────────────
        async function loadAssignments() {
            const container = document.getElementById('assignmentsContent');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Завантаження завдань...</p></div>';
            try {
                const all = await apiGet('/api/assignments') || [];
                assignments = all.filter(a => {
                    if (a.course_id && courseData.id) return a.course_id === courseData.id;
                    return (a.course_name || '').toLowerCase() === (courseData.title || '').toLowerCase();
                });
                document.getElementById('courseAssignments').textContent = assignments.length + ' завдань';
                renderAssignments();
            } catch (e) {
                container.innerHTML = `<div class="empty-state"><div style="font-size:2rem;"></div><div>Помилка: ${e.message}</div></div>`;
            }
        }

        function renderAssignments() {
            const container = document.getElementById('assignmentsContent');
            const role = typeof getRole === 'function' ? getRole() : null;
            if (!assignments.length) {
                container.innerHTML = '<div class="empty-state"><div style="font-size:2.5rem;margin-bottom:.6rem;"></div><div style="font-weight:600;">Завдання відсутні</div><div style="font-size:.85rem;margin-top:.3rem;">Викладач ще не додав завдання на цей курс</div></div>';
                return;
            }
            const fmt = d => d ? new Date(d).toLocaleDateString('uk-UA',{day:'numeric',month:'short',year:'numeric'}) : 'Без терміну';
            const stat = a => a.submitted ? 'submitted' : (a.due_date && new Date(a.due_date) < new Date() ? 'overdue' : 'upcoming');

            container.innerHTML = '<div class="assignments-list">' + assignments.map(a => {
                const s = stat(a);
                const badge = s==='submitted' ? '<span class="grade-pill green">Відправлено</span>'
                    : s==='overdue' ? '<span class="grade-pill yellow">Прострочено</span>'
                    : '<span class="grade-pill blue">На виконання</span>';
                const grade = (a.grade_score!=null) ? `<span class="grade-pill green">${a.grade_score}/100</span>` : '';
                const fb = a.grade_feedback ? `<div style="background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:.5rem .85rem;font-size:.82rem;color:#10b981;margin-bottom:.6rem;">${a.grade_feedback}</div>` : '';
                let btns='';
                if (role==='teacher') {
                    btns = `<button class="cv-btn" onclick="viewSubmissions(${a.id})">Відповіді студентів</button>`;
                } else {
                    if (!a.submission_locked) {
                        btns += `<button class="cv-btn primary" onclick="openAssignmentModal(${a.id})">${a.submitted?'Оновити':'Відправити'}</button>`;
                    } else {
                        btns += `<button class="cv-btn" disabled style="opacity:.5;cursor:not-allowed;">Заблоковано</button>`;
                    }
                    if (a.submission_content) {
                        btns += `<button class="cv-btn success" onclick="viewMySubmission(${a.id})">Моя відповідь</button>`;
                    }
                }
                return `<div class="assignment-item ${s}">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;flex-wrap:wrap;margin-bottom:.4rem;">
                        <div class="assignment-title">${a.title}</div>
                        <div style="display:flex;gap:.4rem;flex-wrap:wrap;">${badge}${grade}</div>
                    </div>
                    <div class="assignment-meta">
                        <span>${fmt(a.due_date)}</span>
                        <span>${a.discipline_name||'—'}</span>
                        <span>${a.max_score||100} балів</span>
                    </div>
                    <div class="assignment-desc">${a.description||'Опис відсутній'}</div>
                    ${fb}
                    <div class="assignment-actions">${btns}</div>
                </div>`;
            }).join('') + '</div>';
        }

        function viewMySubmission(assignmentId) {
            const a = assignments.find(x => x.id === assignmentId);
            const content = a ? (a.submission_content||'') : '';
            openCvModal('Моя відповідь', `
                <div class="cv-code">${content ? content.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '<em style="color:var(--muted)">Текст відсутній</em>'}</div>
                ${a && a.grade_score!=null ? `<div style="margin-top:.85rem;padding:.75rem 1rem;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;"><div style="color:#10b981;font-weight:700;">${a.grade_score}/100</div>${a.grade_feedback?`<div style="font-size:.8rem;color:var(--muted);margin-top:.25rem;">${a.grade_feedback}</div>`:''}</div>` : ''}
            `);
        }

        // ── MATERIALS ───────────────────────────────────────────────
        async function loadMaterials() {
            const container = document.getElementById('materialsContent');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Завантаження...</p></div>';
            try {
                const [topics, materials] = await Promise.all([
                    apiGet(`/api/courses/${courseData.id}/topics`).catch(() => []),
                    apiGet(`/api/courses/${courseData.id}/materials`).catch(() => [])
                ]);
                const tList = topics || [];
                const mList = materials || [];
                if (!tList.length && !mList.length) {
                    container.innerHTML = '<div class="empty-state"><div style="font-size:2.5rem;margin-bottom:.6rem;"></div><div style="font-weight:600;">Матеріалів поки немає</div><div style="font-size:.85rem;">Викладач ще не додав матеріали</div></div>';
                    return;
                }
                const esc = (t) => String(t == null ? '' : t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

                // Text materials block (with content)
                let materialsHtml = '';
                if (mList.length) {
                    materialsHtml = `<div style="margin-bottom:1.5rem;">
                        <div class="disc-label">Навчальні матеріали</div>
                        <div style="display:grid;gap:.5rem;">
                        ${mList.map(m => {
                            const body = m.body || '';
                            const linkify = (raw) => esc(raw).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#3b82f6;">$1</a>');
                            const bodyHtml = body
                                ? `<div style="font-size:.8rem;color:var(--muted);margin-top:.25rem;white-space:pre-wrap;word-break:break-word;">${linkify(body)}</div>`
                                : '';
                            return `<div class="mat-item" style="align-items:flex-start;">
                                <div class="mat-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
                                <div><div style="font-weight:600;font-size:.88rem;">${esc(m.title)}</div>${bodyHtml}</div>
                            </div>`;
                        }).join('')}
                        </div>
                    </div>`;
                }

                const byDisc = {};
                tList.forEach(t => { const d=t.discipline_name||'Загальне'; (byDisc[d]=byDisc[d]||[]).push(t); });
                const role = typeof getRole === 'function' ? getRole() : null;
                const addHtml = role==='teacher'
                    ? `<div style="display:flex;gap:.5rem;margin-bottom:1.25rem;"><input id="newTopicInput" class="cv-input" placeholder="Назва нової теми"><button class="cv-btn primary" onclick="addTopic()">+ Додати тему</button></div>` : '';
                const topicsHtml = Object.entries(byDisc).map(([disc,ts]) => `
                    <div style="margin-bottom:1.5rem;">
                        <div class="disc-label">${esc(disc)}</div>
                        <div style="display:grid;gap:.5rem;">
                        ${ts.map(t=>`<div class="mat-item">
                            <div class="mat-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
                            <div><div style="font-weight:600;font-size:.88rem;">${esc(t.title)}</div><div style="font-size:.75rem;color:var(--muted);margin-top:.15rem;">Тема</div></div>
                        </div>`).join('')}
                        </div>
                    </div>`).join('');
                container.innerHTML = addHtml + materialsHtml + topicsHtml;
            } catch(e) {
                container.innerHTML = `<div class="empty-state"><div style="font-size:2rem;"></div><div>Помилка: ${e.message}</div></div>`;
            }
        }

        async function addTopic() {
            const input = document.getElementById('newTopicInput');
            if (!input || !input.value.trim()) return;
            try {
                const topics = await apiGet(`/api/courses/${courseData.id}/topics`) || [];
                const discId = topics.length ? topics[0].discipline_id : null;
                if (!discId) { cvToast('Спочатку додайте курс до курсу','error'); return; }
                await apiPost(`/api/courses/${courseData.id}/topics`, {title:input.value.trim(), discipline_id:discId});
                cvToast('Тему додано','success');
                await loadMaterials();
            } catch(e) { cvToast('Помилка: '+e.message,'error'); }
        }

        // ── STUDENTS (teacher) ──────────────────────────────────────
        async function loadStudents() {
            const container = document.getElementById('studentsContent');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Завантаження...</p></div>';
            try {
                const students = await apiGet('/api/teacher/students') || [];
                if (!students.length) {
                    container.innerHTML = '<div class="empty-state"><div style="font-size:2rem;"></div><div>Студентів не знайдено</div></div>';
                    return;
                }
                container.innerHTML = students.map(s => `
                    <div class="student-row">
                        <div class="student-avatar">${(s.full_name||'?').split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
                        <div style="flex:1;">
                            <div style="font-weight:600;font-size:.9rem;">${s.full_name}</div>
                            <div style="font-size:.78rem;color:var(--muted);">${s.email||''} · ${s.group||'—'}</div>
                        </div>
                        ${s.avg_grade!=null?`<span class="grade-pill ${s.avg_grade>=90?'green':s.avg_grade>=70?'blue':'yellow'}">${s.avg_grade}%</span>`:''}
                    </div>`).join('');
            } catch(e) {
                container.innerHTML = `<div class="empty-state"><div style="font-size:2rem;"></div><div>Помилка: ${e.message}</div></div>`;
            }
        }

        // ── INFO ────────────────────────────────────────────────────
        async function loadInfo() {
            const info = document.getElementById('infoContent');
            info.innerHTML = '<div class="loading"><div class="spinner"></div><p>Завантаження...</p></div>';
            try {
                const topics = await apiGet(`/api/courses/${courseData.id}/topics`) || [];
                const discMap = {};
                topics.forEach(t => { discMap[t.discipline_name||'—'] = (discMap[t.discipline_name||'—']||0)+1; });

                // Teacher(s) responsible for this course (who answers questions in Telegram).
                let teacherHtml = '';
                try {
                    const tResp = await apiGet(`/api/courses/${courseData.id}/teacher`);
                    const teachers = (tResp && tResp.teachers) ? tResp.teachers : [];
                    if (teachers.length) {
                        const names = teachers.map(t => t.full_name).filter(Boolean).join(', ');
                        teacherHtml = `<div class="disc-label">Викладач</div>
                            <div style="display:flex;align-items:center;gap:.6rem;padding:.6rem .9rem;background:var(--ink);border:1px solid var(--border);border-radius:8px;font-size:.9rem;margin-bottom:1.25rem;">
                                <span style="font-weight:600;">${names}</span>
                            </div>`;
                    }
                } catch(e) {}

                let links = '';
                try {
                    const sched = await apiGet('/api/schedule') || [];
                    const upcoming = sched.filter(s=>s.meeting_link).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3);
                    if (upcoming.length) {
                        links = `<div style="margin-top:1.25rem;"><div class="disc-label">Найближчі заняття</div>${upcoming.map(s=>`<a href="${s.meeting_link}" target="_blank" class="lesson-link">${s.date} ${String(s.time).slice(0,5)} — Підключитись</a>`).join('')}</div>`;
                    }
                } catch(e) {}
                info.innerHTML = `
                    <div style="font-weight:700;font-size:1rem;margin-bottom:1rem;">${courseData.title}</div>
                    <p style="color:var(--muted);line-height:1.6;margin-bottom:1.5rem;">${courseData.description||'Опис відсутній'}</p>
                    ${teacherHtml}
                    <div class="disc-label">Курси (${Object.keys(discMap).length})</div>
                    <div style="display:grid;gap:.4rem;margin-bottom:.5rem;">
                        ${Object.entries(discMap).map(([d,n])=>`<div style="display:flex;justify-content:space-between;padding:.6rem .9rem;background:var(--ink);border:1px solid var(--border);border-radius:8px;font-size:.88rem;"><span>${d}</span><span style="color:var(--muted);">${n} тем</span></div>`).join('')||'<div style="color:var(--muted);font-size:.85rem;">Курсів ще немає</div>'}
                    </div>
                    ${links}`;
            } catch(e) {
                info.innerHTML = `<div class="empty-state"><div style="font-size:2rem;"></div><div>Помилка: ${e.message}</div></div>`;
            }
        }

        // ── SIDEBAR (quick access) ──────────────────────────────────
        async function renderSidebar() {
            const el = document.getElementById('sidebarContent');
            const submitted = assignments.filter(a=>a.submitted).length;
            const total = assignments.length;
            const pct = total ? Math.round(submitted/total*100) : 0;
            el.innerHTML = `
                <div style="margin-bottom:1.25rem;">
                    <div style="display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:.5rem;"><span style="color:var(--muted);">Прогрес курсу</span><span style="font-weight:700;color:#3b82f6;">${pct}%</span></div>
                    <div style="height:7px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#2563eb,#06b6d4);border-radius:99px;transition:width .8s;"></div></div>
                </div>
                <div style="display:grid;gap:.6rem;">
                    <div style="display:flex;justify-content:space-between;padding:.65rem .85rem;background:var(--ink);border:1px solid var(--border);border-radius:8px;font-size:.85rem;"><span>Виконано</span><strong>${submitted}</strong></div>
                    <div style="display:flex;justify-content:space-between;padding:.65rem .85rem;background:var(--ink);border:1px solid var(--border);border-radius:8px;font-size:.85rem;"><span>Всього</span><strong>${total}</strong></div>
                </div>
                <a href="grades.html" class="cv-btn" style="width:100%;justify-content:center;margin-top:1rem;text-decoration:none;">Мої оцінки</a>`;
        }

        // ── TABS ────────────────────────────────────────────────────
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            if (tab==='materials') loadMaterials();
            if (tab==='students') loadStudents();
            if (tab==='info') loadInfo();
        }

        // ── TEACHER: view submissions ───────────────────────────────
        async function viewSubmissions(assignmentId) {
            const a = assignments.find(x=>x.id===assignmentId);
            try {
                const subs = await apiGet(`/api/assignments/${assignmentId}/submissions`) || [];
                const rows = !subs.length
                    ? '<div class="empty-state" style="padding:2rem;">Відповідей ще немає</div>'
                    : subs.map(s=>`<div style="background:var(--ink);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.65rem;">
                        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.6rem;">
                            <div><div style="font-weight:700;">${s.student_name||'Студент'}</div><div style="font-size:.8rem;color:var(--muted);">${s.student_email||''}</div></div>
                            <span class="grade-pill green">${s.submitted_at?new Date(s.submitted_at).toLocaleDateString('uk-UA'):''}</span>
                        </div>
                        ${s.content?`<div class="cv-code" style="max-height:160px;">${s.content.substring(0,800).replace(/</g,'&lt;')}</div>`:'<div style="color:var(--muted);font-style:italic;font-size:.85rem;">Без тексту</div>'}
                        ${s.grade_score!=null?`<div style="margin-top:.6rem;"><span class="grade-pill green">${s.grade_score}/100</span></div>`:''}
                    </div>`).join('');
                openCvModal(`${a?a.title:'Відповіді'}`, `<div style="font-size:.82rem;color:var(--muted);margin-bottom:1rem;">Відповідей: ${subs.length}</div>${rows}`, 700);
            } catch(e) { cvToast('Помилка: '+e.message,'error'); }
        }

        // ── STUDENT: submit assignment ──────────────────────────────
        function openAssignmentModal(assignmentId) {
            const a = assignments.find(x=>x.id===assignmentId);
            if (!a) return;
            const isUpd = !!a.submitted;
            openCvModal(isUpd?'Оновити відповідь':'Відправити завдання', `
                <div style="font-weight:600;margin-bottom:.6rem;">${a.title}</div>
                <div class="cv-code" style="margin-bottom:1rem;">${a.description||'Опис відсутній'}</div>
                <form id="cvSubmitForm" onsubmit="submitAssignment(event,${a.id})">
                    <label class="cv-form-label">Текст відповіді *</label>
                    <textarea id="cvSubContent" class="cv-textarea" required placeholder="Опишіть виконання, додайте посилання...">${a.submission_content||''}</textarea>
                    <label class="cv-form-label" style="margin-top:.9rem;">Файл (необов'язково)</label>
                    <input id="cvSubFile" type="file" class="cv-input" style="padding:.55rem;">
                    <div class="cv-footer">
                        <button type="button" class="cv-btn" onclick="closeCvModal()">Скасувати</button>
                        <button type="submit" class="cv-btn primary">${isUpd?'Оновити':'Відправити'}</button>
                    </div>
                </form>`);
        }

        async function submitAssignment(e, assignmentId) {
            e.preventDefault();
            const content = document.getElementById('cvSubContent').value.trim();
            const fileEl = document.getElementById('cvSubFile');
            const fileName = fileEl && fileEl.files[0] ? fileEl.files[0].name : null;
            if (!content) { cvToast('Введіть текст відповіді','error'); return; }
            try {
                const r = await apiPost(`/api/assignments/${assignmentId}/submit`, {content, file_name:fileName});
                if (r && (r.success||r.submission_id)) {
                    closeCvModal();
                    cvToast('Завдання відправлено!','success');
                    await loadAssignments();
                    await renderSidebar();
                } else { cvToast('Помилка відправлення','error'); }
            } catch(err) { cvToast('Помилка: '+err.message,'error'); }
        }

        // ── MODAL helpers ───────────────────────────────────────────
        function openCvModal(title, bodyHtml, maxWidth=560) {
            let m = document.getElementById('cvModal');
            if (!m) {
                m = document.createElement('div');
                m.id='cvModal'; m.className='cv-modal';
                m.addEventListener('click',e=>{if(e.target===m)closeCvModal();});
                document.body.appendChild(m);
            }
            m.innerHTML = `<div class="cv-modal-box" style="max-width:${maxWidth}px;">
                <div class="cv-modal-head"><h2>${title}</h2><button class="cv-close" onclick="closeCvModal()">✕</button></div>
                ${bodyHtml}</div>`;
            m.classList.add('open');
        }
        function closeCvModal(){ const m=document.getElementById('cvModal'); if(m)m.classList.remove('open'); }

        function cvToast(msg,type='success') {
            if (typeof showToast==='function'){showToast(msg,type);return;}
            const t=document.createElement('div');
            t.textContent=msg;
            t.style.cssText=`position:fixed;bottom:2rem;right:2rem;padding:.8rem 1.4rem;border-radius:10px;font-weight:600;z-index:9999;color:#fff;background:${type==='error'?'#ef4444':'#10b981'};`;
            document.body.appendChild(t);
            setTimeout(()=>t.remove(),3000);
        }

        function logout() {
            if (typeof clearAuth==='function') clearAuth();
            window.location.href='/index.html';
        }

</script>
</body>
</html>
