<head>

    <style>

    body{font-family:'Manrope',sans-serif;background:var(--ink);color:#fff;margin:0;}
    .app{display:flex;min-height:100vh;}
    .sidebar{width:260px;background:var(--ink-soft);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .3s;}
    .sidebar-logo{display:flex;align-items:center;gap:.65rem;padding:1.5rem;border-bottom:1px solid var(--border);}
    .sidebar-logo img{height:32px;}
    .sidebar-logo span{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:-.02em;}
    .sidebar-logo span b{color:#3b82f6;font-weight:900;}
    .sidebar-nav{flex:1;padding:1rem .75rem;overflow-y:auto;}
    .sidebar-nav a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;margin-bottom:.2rem;transition:all .2s;}
    .sidebar-nav a:hover{background:rgba(255,255,255,.05);color:#fff;}
    .sidebar-nav a.active{background:rgba(37,99,235,.12);color:#3b82f6;border:1px solid rgba(37,99,235,.2);}
    .sidebar-nav a svg{flex-shrink:0;opacity:.7;}
    .sidebar-nav a.active svg{opacity:1;}
    .sidebar-bottom{padding:.75rem;border-top:1px solid var(--border);}
    .sidebar-bottom a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .2s;}
    .sidebar-bottom a:hover{background:rgba(239,68,68,.1);color:#ef4444;}
    .main-wrap{flex:1;margin-left:260px;min-height:100vh;display:flex;flex-direction:column;}
    .page-banner{background:linear-gradient(135deg,#0d1b4b 0%,#1a1040 60%,var(--ink) 100%);padding:2.5rem 2rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
    .page-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 120% at 40% 0%,rgba(37,99,235,.2),transparent);pointer-events:none;}
    .page-banner h1{font-family:'Unbounded',sans-serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:900;letter-spacing:-.03em;position:relative;z-index:1;color:#fff;}
    .page-banner p{color:var(--muted);font-size:.95rem;margin-top:.35rem;position:relative;z-index:1;}
    .page-body{padding:2rem;flex:1;}
    .mobile-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:300;background:var(--blue);border:none;border-radius:10px;padding:.65rem;cursor:pointer;color:#fff;}
    @media(max-width:768px){
        .sidebar{transform:translateX(-100%);}
        .sidebar.active{transform:translateX(0);}
        .main-wrap{margin-left:0;}
        .page-body{padding:1rem;}
        .mobile-toggle{display:flex;}
    }


    .search-row{display:flex;gap:.75rem;margin-bottom:1.5rem;}
    .search-row input{flex:1;padding:.75rem 1rem .75rem 2.75rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:.9rem;font-family:'Manrope',sans-serif;outline:none;transition:all .2s;}
    .search-row input:focus{border-color:rgba(37,99,235,.5);background:rgba(255,255,255,.07);}
    .search-row input::placeholder{color:var(--muted);}
    .search-wrap{position:relative;flex:1;}
    .search-wrap svg{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
    .filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
    .filter-btn{padding:.45rem 1.1rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .2s;}
    .filter-btn:hover{border-color:rgba(37,99,235,.4);color:#fff;}
    .filter-btn.active{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:#3b82f6;}
    .scope-row{display:none;gap:.5rem;margin-bottom:1.25rem;}
    .scope-row.visible{display:flex;}
    .courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;}
    .course-card{background:var(--ink-soft);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .3s;cursor:pointer;}
    .course-card:hover{border-color:rgba(37,99,235,.35);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
    .course-header{height:130px;background:linear-gradient(135deg,#1e2d5e,#2563eb);display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;padding:1.25rem;}
    .course-category{padding:.25rem .75rem;border-radius:999px;background:rgba(255,255,255,.15);font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fff;}
    .course-icon{color:rgba(255,255,255,.3);font-size:2.5rem;}
    .course-body{padding:1.25rem;}
    .course-title-text{font-weight:700;font-size:.95rem;margin-bottom:.4rem;}
    .course-desc-text{color:var(--muted);font-size:.82rem;line-height:1.5;margin-bottom:1rem;}
    .course-meta{display:flex;gap:.75rem;font-size:.8rem;color:var(--muted);}
    .course-action-row{display:flex;gap:.5rem;margin-top:1.1rem;padding-top:1rem;border-top:1px solid var(--border);}
    .empty-state{text-align:center;padding:3rem;color:var(--muted);}
    .empty-state .empty-icon{font-size:3rem;margin-bottom:1rem;}

    </style>

    <script>
        (function(){
            var toggle = document.getElementById('mobileToggle');
            var sidebar = document.getElementById('sidebar');
            if(toggle) toggle.addEventListener('click', function(){ sidebar.classList.toggle('active'); });
            document.addEventListener('click', function(e){
                if(window.innerWidth <= 768 && sidebar && !sidebar.contains(e.target) && toggle && !toggle.contains(e.target))
                    sidebar.classList.remove('active');
            });
            // Mark active nav link
            var cur = location.pathname.split('/').pop();
            document.querySelectorAll('.sidebar-nav a').forEach(function(a){
                if(a.getAttribute('href') === cur) a.classList.add('active');
            });
        })();
    </script>

    <script>
        let allCourses = [];
        let currentUser = null;
        let enrolledCourseIds = new Set();
        let teacherCourseIds = new Set();
        let selectedCategory = 'all';
        let selectedScope = 'all';
        let searchTerm = '';

        function getCoursePresentation(course) {
            const presets = [
                { studied: 'HTML, CSS, JavaScript, робота з API', hours: 96, schedule: 'Вт/Чт 18:30-20:00' },
                { studied: 'SQL, нормалізація, оптимізація запитів', hours: 72, schedule: 'Пн/Ср 17:00-18:30' },
                { studied: 'Алгоритми, структури даних, практика інтервʼю', hours: 84, schedule: 'Сб 10:00-13:00' },
                { studied: 'UI/UX, прототипування, дизайн-системи', hours: 60, schedule: 'Пт 18:00-20:00' },
            ];
            return presets[course.id % presets.length];
        }

        function getCourseCategory(course) {
            if (course.category) return course.category;
            const title = (course.title || '').toLowerCase();
            const description = (course.description || '').toLowerCase();
            const text = `${title} ${description}`;
            if (text.includes('дизайн') || text.includes('ui/ux') || text.includes('figma')) return 'design';
            if (text.includes('баз') || text.includes('sql') || text.includes('database')) return 'database';
            if (text.includes('математ') || text.includes('логіка') || text.includes('комбінатор')) return 'mathematics';
            return 'programming';
        }

        function getVisibleCourses() {
            const role = typeof getRole === 'function' ? getRole() : null;
            return allCourses.filter(c => {
                const byCategory = selectedCategory === 'all' || getCourseCategory(c) === selectedCategory;
                const bySearch = !searchTerm ||
                    (c.title || '').toLowerCase().includes(searchTerm) ||
                    (c.description || '').toLowerCase().includes(searchTerm);
                const byScope = role !== 'student' || selectedScope === 'all' || enrolledCourseIds.has(c.id);
                return byCategory && bySearch && byScope;
            });
        }

        function setCourseScope(scope) {
            selectedScope = scope;
            document.getElementById('scopeAllBtn').classList.toggle('active', scope === 'all');
            document.getElementById('scopeMyBtn').classList.toggle('active', scope === 'my');
            renderByState();
        }

        function renderByState() {
            renderCourses(getVisibleCourses());
        }

        function setActiveFilterButton(category) {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                const tabCategory = tab.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                tab.classList.toggle('active', tabCategory === category);
            });
        }

        async function refreshStudentCourseAccess() {
            const role = typeof getRole === 'function' ? getRole() : null;
            const token = typeof getToken === 'function' ? getToken() : null;
            
            if (!token) {
                enrolledCourseIds = new Set();
                teacherCourseIds = new Set();
                return;
            }

            if (role === 'student') {
                try {
                    const studentCourses = await apiGet('/api/student/courses') || [];
                    enrolledCourseIds = new Set(studentCourses.map(c => c.course_id));
                } catch (err) {
                    console.warn('Cannot load student course access:', err);
                    enrolledCourseIds = new Set();
                }
            } else if (role === 'teacher') {
                try {
                    const teacherCourses = await apiGet('/api/teacher/courses') || [];
                    teacherCourseIds = new Set(teacherCourses.map(c => c.id));
                } catch (err) {
                    console.warn('Cannot load teacher courses:', err);
                    teacherCourseIds = new Set();
                }
            }
        }

        window.addEventListener('load', async () => {
            // Check user role
            const role = typeof getRole === 'function' ? getRole() : null;
            const token = typeof getToken === 'function' ? getToken() : null;
            
            // Role-based navigation
            const teacherElements = document.querySelectorAll('.teacher-only');
            const studentElements = document.querySelectorAll('.student-only');
            
            if (role === 'teacher') {
                teacherElements.forEach(el => el.style.display = 'inline-block');
                studentElements.forEach(el => el.style.display = 'none');
            } else {
                teacherElements.forEach(el => el.style.display = 'none');
                studentElements.forEach(el => el.style.display = 'inline-block');
            }
            
            // If teacher, show their courses
            if (role === 'teacher') {
                const ht = document.getElementById('pageHeaderTitle'); if (ht) ht.textContent = 'Мої курси';
                const hs = document.getElementById('pageHeaderSubtitle'); if (hs) hs.textContent = 'Курси, які ви викладаєте';
                const ft = document.querySelector('.filter-tabs'); if (ft) ft.style.display = 'none';
                const sb = document.querySelector('.search-bar'); if (sb) sb.style.display = 'none';
            } else if (role === 'student') {
                const scope = document.getElementById('studentCourseScope');
                if (scope) scope.style.display = 'flex';
            }
            
            showDemoBanner();
            if (typeof adjustNavForRole === 'function') adjustNavForRole();
            try {
                currentUser = await fetchCurrentUser();
            } catch (err) {
                console.warn('Cannot load current user:', err);
                currentUser = null;
            }
            
            // Load course access for both students and teachers
            await refreshStudentCourseAccess();
            
            try {
                allCourses = await apiGet('/api/courses') || [];
            } catch (err) {
                console.error('Cannot load courses:', err);
                allCourses = [];
            }
            renderByState();
        });

        const COURSE_COLORS = [
            'linear-gradient(135deg,#2563eb,#4f46e5)',
            'linear-gradient(135deg,#10b981,#059669)',
            'linear-gradient(135deg,#f59e0b,#d97706)',
            'linear-gradient(135deg,#8b5cf6,#7c3aed)',
            'linear-gradient(135deg,#ef4444,#dc2626)',
            'linear-gradient(135deg,#06b6d4,#0891b2)'
        ];

        function renderCourses(courses) {
            const grid = document.getElementById('coursesGrid');
            const token = typeof getToken === 'function' ? getToken() : null;
            const role  = typeof getRole  === 'function' ? getRole()  : null;

            if (!courses.length) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#64748b;">Курсів не знайдено</div>';
                return;
            }
            grid.innerHTML = courses.map((course, i) => {
                const info = getCoursePresentation(course);
                let enrollmentBtnHtml = '';
                
                if (role === 'teacher') {
                    // Teacher view: show manage button only if they teach this course
                    const teachesThisCourse = teacherCourseIds.has(course.id);
                    if (teachesThisCourse) {
                        enrollmentBtnHtml = `
                            <button disabled style="width:100%;margin-top:1rem;padding:.875rem;background:rgba(16,185,129,.1);color:var(--success-color,#10b981);border:1px solid rgba(16,185,129,.2);border-radius:.75rem;font-weight:600;cursor:default;">
                                Ви викладаєте цей курс
                            </button>
                        `;
                    } else {
                        enrollmentBtnHtml = `
                            <button disabled style="width:100%;margin-top:1rem;padding:.875rem;background:var(--bg-tertiary,#f1f5f9);color:#64748b;border:1px solid #cbd5e1;border-radius:.75rem;font-weight:600;cursor:not-allowed;">
                                — Ви не викладаєте
                            </button>
                        `;
                    }
                } else if (token && role === 'student') {
                    // Check if enrolled
                    const isEnrolled = enrolledCourseIds.has(course.id);
                    if (isEnrolled) {
                        enrollmentBtnHtml = `
                            <button disabled style="width:100%;margin-top:1rem;padding:.875rem;background:var(--bg-tertiary,#f1f5f9);color:#64748b;border:1px solid #cbd5e1;border-radius:.75rem;font-weight:600;cursor:not-allowed;">
                                Ви вже записані
                            </button>
                        `;
                    } else {
                        enrollmentBtnHtml = `
                            <button disabled style="width:100%;margin-top:1rem;padding:.875rem;background:rgba(245,158,11,.1);color:#92400e;border:1px solid rgba(245,158,11,.25);border-radius:.75rem;font-weight:600;cursor:not-allowed;">
                                Запис виконує адміністратор
                            </button>
                        `;
                    }
                } else if (!token) {
                    enrollmentBtnHtml = `
                        <a href="index.html" style="display:block;width:100%;margin-top:1rem;padding:.875rem;background:var(--bg-tertiary,#f1f5f9);color:#64748b;border-radius:.75rem;font-weight:600;text-align:center;text-decoration:none;">
                            Увійдіть для запису
                        </a>
                    `;
                }

                return `
                <div class="course-card" data-category="${getCourseCategory(course)}" data-id="${course.id}" onclick="openCourseView(${course.id})" style="cursor:pointer;">
                    <div class="course-header" style="background:${COURSE_COLORS[i % COURSE_COLORS.length]}">
                        <div class="course-category">Курс</div>
                        <div class="course-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="course-body">
                        <h3 class="course-title">${course.title}</h3>
                        <p class="course-instructor">Викладач: Адміністрація курсів</p>
                        <p class="course-description">${course.description || 'Опис відсутній'}</p>
                        <p class="course-description"><strong>Вивчаємо:</strong> ${info.studied}</p>
                        <div class="course-meta">
                            <div class="course-duration">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                ${info.hours} годин
                            </div>
                            <span class="course-level level-beginner">Початковий</span>
                        </div>
                        <p class="course-description" style="margin-top:.5rem;"><strong>Розклад:</strong> ${info.schedule}</p>
                        ${enrollmentBtnHtml}
                    </div>
                </div>`;
            }).join('');
        }

        // Filter
        function filterCourses(category) {
            selectedCategory = category;
            setActiveFilterButton(category);
            renderByState();
        }

        // Search
        function searchCourses() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            renderByState();
        }

        // Open course view
        function openCourseView(courseId) {
            const role = typeof getRole === 'function' ? getRole() : null;
            // Students may only open the full course view for courses they're enrolled in.
            // (The catalog card already shows public info: title, teacher, schedule.)
            if (role === 'student' && !enrolledCourseIds.has(courseId)) {
                if (typeof showToast === 'function') {
                    showToast('Ви не записані на цей курс. Зверніться до адміністратора.', 'info');
                } else {
                    alert('Ви не записані на цей курс.');
                }
                return;
            }
            window.location.href = `course-view.html?id=${courseId}`;
        }

        // Logout
        function logout() {
            if (typeof clearAuth === 'function') {
                clearAuth();
            }
            window.location.href = '/index.html';
        }

        document.getElementById('searchInput').addEventListener('input', searchCourses);
    </script>
</body>
</html>
