<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Питання студентів — IT School</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@600;700;800&display=swap" rel="stylesheet"><style>
:root{--bg:#0b1020;--ink-soft:#151b2e;--card:#151b2e;--text:#f8fafc;--muted:#94a3b8;--border:rgba(148,163,184,.18);--blue:#2563eb;--green:#10b981;--orange:#f59e0b;--red:#ef4444}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Manrope,sans-serif;background:var(--bg);color:var(--text)}.app{display:flex}.sidebar{width:260px;background:var(--ink-soft);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column}.sidebar-logo{display:flex;align-items:center;gap:.65rem;padding:1.5rem;border-bottom:1px solid var(--border)}.sidebar-logo img{height:32px}.sidebar-logo span{font-family:Unbounded,sans-serif;font-weight:800}.sidebar-logo b{color:#3b82f6}.profile{padding:1.2rem;text-align:center;border-bottom:1px solid var(--border)}.avatar{width:58px;height:58px;margin:0 auto .6rem;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#10b981,#059669);font-weight:900}.sidebar-nav{padding:.75rem;flex:1}.sidebar-nav a{display:flex;padding:.78rem 1rem;border-radius:12px;color:var(--muted);text-decoration:none;font-weight:700;margin-bottom:.2rem}.sidebar-nav a:hover{background:rgba(255,255,255,.05);color:#fff}.sidebar-nav a.active{background:rgba(37,99,235,.14);border:1px solid rgba(37,99,235,.25);color:#60a5fa}.sidebar-bottom{padding:.75rem;border-top:1px solid var(--border)}.sidebar-bottom a{color:var(--muted);text-decoration:none}.main{margin-left:260px;flex:1;padding:2rem}.head{display:flex;justify-content:space-between;gap:1rem;margin-bottom:1.5rem}.head h1{font-family:Unbounded,sans-serif;font-size:1.55rem;margin-bottom:.35rem}.head p,.meta{color:var(--muted);line-height:1.5}.layout{display:grid;grid-template-columns:420px 1fr;gap:1rem}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.25rem}.tabs{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1rem}.tab{border:1px solid var(--border);background:rgba(148,163,184,.08);color:#cbd5e1;border-radius:999px;padding:.52rem .85rem;cursor:pointer;font-weight:800}.tab.active{background:rgba(37,99,235,.16);border-color:rgba(37,99,235,.45);color:#60a5fa}.thread{padding:1rem;border:1px solid var(--border);border-radius:15px;background:rgba(15,23,42,.55);margin-bottom:.75rem;cursor:pointer}.thread:hover{border-color:rgba(37,99,235,.4)}.top{display:flex;justify-content:space-between;gap:.6rem}.title{font-weight:900}.badge{border-radius:999px;padding:.18rem .55rem;font-size:.7rem;font-weight:900}.b-new{background:rgba(37,99,235,.16);color:#60a5fa}.b-waiting_answer{background:rgba(245,158,11,.16);color:#fbbf24}.b-answered{background:rgba(16,185,129,.16);color:#34d399}.b-closed{background:rgba(148,163,184,.16);color:#cbd5e1}.b-high{background:rgba(239,68,68,.18);color:#f87171}.message{padding:.9rem;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04);margin:.65rem 0}.who{font-size:.8rem;color:#93c5fd;font-weight:900;margin-bottom:.25rem}textarea{width:100%;min-height:115px;background:#0f172a;color:#fff;border:1px solid var(--border);border-radius:12px;padding:.8rem;font:inherit;resize:vertical}.btn{border:0;border-radius:12px;background:var(--blue);color:#fff;padding:.8rem 1rem;font-weight:900;cursor:pointer}.btn.secondary{background:rgba(148,163,184,.12);border:1px solid var(--border);color:#e2e8f0}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap}.empty{text-align:center;color:var(--muted);padding:2rem;border:1px dashed var(--border);border-radius:16px}.toast{position:fixed;right:1rem;bottom:1rem;background:#0f172a;color:#fff;border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;z-index:6000}@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:1rem}.layout{grid-template-columns:1fr}}
</style><link rel="stylesheet" href="professional-ui.css"><link rel="stylesheet" href="theme-light.css"><link rel="stylesheet" href="ui-system.css"></head><body><div class="app"><aside class="sidebar"><div class="sidebar-logo"><img src="assets/logo-code-mark.png"><span>IT&nbsp;<b>School</b></span></div><div class="profile"><div class="avatar" id="avatar">В</div><div id="userName">Викладач</div><div class="meta">Викладач</div></div><nav class="sidebar-nav"><a href="teacher-dashboard.html">Огляд</a><a class="active" href="teacher-questions.html">Питання студентів</a></nav><div class="sidebar-bottom"><a href="#" onclick="logout();return false;">Вийти</a></div></aside><main class="main"><div class="head"><div><h1>Питання студентів</h1><p>Тут зібрані звернення студентів до вас. Відповідайте, закривайте або відстежуйте важливі питання.</p></div><button class="btn secondary" onclick="loadThreads()">Оновити</button></div><div class="layout"><section class="card"><div class="tabs"><button class="tab active" data-filter="all">Усі</button><button class="tab" data-filter="new">Нові</button><button class="tab" data-filter="waiting_answer">Очікують</button><button class="tab" data-filter="answered">Відповіли</button><button class="tab" data-filter="closed">Закриті</button></div><div id="list"></div></section><section class="card" id="detail"><div class="empty">Оберіть питання зі списку.</div></section></div></main></div><script src="config.js"></script><script src="mockData.js"></script><script src="api.js"></script><script>
if(!requireAuth()) throw new Error('auth'); if(getRole()!=='teacher'){ location.href='index.html'; }
let threads=[]; let filter='all'; const labels={new:'Нове',waiting_answer:'Очікує відповіді',answered:'Відповідь надано',closed:'Закрито'};function toast(t){const d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2500)}function render(){let rows=threads;if(filter!=='all')rows=rows.filter(x=>x.status===filter);const box=document.getElementById('list');if(!rows.length){box.innerHTML='<div class="empty">Питань немає.</div>';return}box.innerHTML=rows.map(q=>`<div class="thread" onclick="openThread(${q.id})"><div class="top"><div class="title">${escapeHtml(q.title)}</div><span class="badge b-${q.status}">${labels[q.status]||q.status}</span></div><div class="meta">${escapeHtml(q.student_name||q.student_email||'Студент')} · ${escapeHtml(q.course_title||'Курс не вказано')} ${q.priority==='high'?'· <span class="badge b-high">Важливе</span>':''}</div><div class="meta">${escapeHtml((q.last_message||'').slice(0,120))}</div></div>`).join('')}
async function loadThreads(){try{threads=await apiGet('/api/questions/teacher')||[];render()}catch(e){document.getElementById('list').innerHTML=`<div class="empty">${escapeHtml(e.message)}</div>`}}
async function openThread(id){const q=await apiGet(`/api/questions/${id}`);document.getElementById('detail').innerHTML=`<h2>${escapeHtml(q.title)}</h2><div class="meta">${escapeHtml(q.student_name||q.student_email||'Студент')} · ${escapeHtml(q.course_title||'Курс')} · ${labels[q.status]||q.status}</div><div style="margin:1rem 0">${(q.messages||[]).map(m=>`<div class="message"><div class="who">${escapeHtml(m.sender_name||m.sender_role)} · ${new Date(m.created_at).toLocaleString('uk-UA')}</div><div>${escapeHtml(m.message_text)}</div></div>`).join('')}</div>${q.status!=='closed'?`<textarea id="replyText" placeholder="Напишіть відповідь студенту..."></textarea><div class="btn-row" style="margin-top:.8rem"><button class="btn" onclick="sendReply(${q.id})">Відповісти</button><button class="btn secondary" onclick="closeThread(${q.id})">Закрити</button></div>`:'<div class="empty">Питання закрито.</div>'}`}
async function sendReply(id){const t=document.getElementById('replyText').value.trim();if(!t)return toast('Введіть відповідь');await replyQuestion(id,t);toast('Відповідь надіслано');await loadThreads();await openThread(id)}async function closeThread(id){await closeQuestion(id);toast('Закрито');await loadThreads();await openThread(id)}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;render()}));fetchCurrentUser().then(u=>{userName.textContent=u.full_name||u.email;avatar.textContent=(u.full_name||u.email||'В').trim()[0].toUpperCase()}).catch(()=>{});loadThreads();
</script></body></html>
