<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Питання — IT School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1020;--ink:#111827;--ink-soft:#151b2e;--text:#f8fafc;--muted:#94a3b8;--border:rgba(148,163,184,.18);--blue:#2563eb;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--card:#151b2e;}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app{display:flex}.sidebar{width:260px;background:var(--ink-soft);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200}.sidebar-logo{display:flex;align-items:center;gap:.65rem;padding:1.5rem;border-bottom:1px solid var(--border)}.sidebar-logo img{height:32px}.sidebar-logo span{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700}.sidebar-logo b{color:#3b82f6}.sidebar-nav{flex:1;padding:.75rem}.sidebar-nav a{display:flex;align-items:center;gap:.75rem;padding:.78rem 1rem;border-radius:12px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:600;margin-bottom:.18rem}.sidebar-nav a:hover{background:rgba(255,255,255,.05);color:#fff}.sidebar-nav a.active{background:rgba(37,99,235,.14);color:#3b82f6;border:1px solid rgba(37,99,235,.25)}.sidebar-bottom{padding:.75rem;border-top:1px solid var(--border)}.sidebar-bottom a{display:flex;gap:.75rem;color:var(--muted);text-decoration:none;padding:.78rem 1rem;border-radius:12px}.main{margin-left:260px;flex:1;padding:2rem;max-width:1500px}.page-head{display:flex;justify-content:space-between;gap:1rem;align-items:flex-start;margin-bottom:1.5rem}.page-head h1{font-family:'Unbounded',sans-serif;font-size:1.7rem;margin-bottom:.35rem}.page-head p{color:var(--muted);line-height:1.55}.grid{display:grid;grid-template-columns:minmax(320px,430px) 1fr;gap:1.25rem}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.25rem;box-shadow:0 12px 36px rgba(0,0,0,.18)}.card h2{font-size:1rem;margin-bottom:1rem}.field{margin-bottom:.9rem}.field label{display:block;color:#cbd5e1;font-weight:700;font-size:.82rem;margin-bottom:.4rem}input,textarea,select{width:100%;border:1px solid var(--border);background:#0f172a;color:#f8fafc;border-radius:12px;padding:.85rem .95rem;font:inherit;outline:none}textarea{min-height:120px;resize:vertical}input:focus,textarea:focus,select:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(37,99,235,.16)}.btn{border:none;border-radius:12px;padding:.85rem 1.1rem;font-weight:800;cursor:pointer;background:var(--blue);color:#fff}.btn.secondary{background:rgba(148,163,184,.12);color:#e2e8f0;border:1px solid var(--border)}.btn-row{display:flex;gap:.7rem;flex-wrap:wrap}.tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}.tab{border:1px solid var(--border);background:rgba(148,163,184,.08);color:#cbd5e1;border-radius:999px;padding:.55rem .9rem;cursor:pointer;font-weight:800;font-size:.82rem}.tab.active{background:rgba(37,99,235,.16);border-color:rgba(37,99,235,.45);color:#60a5fa}.thread{border:1px solid var(--border);border-radius:16px;padding:1rem;margin-bottom:.8rem;background:rgba(15,23,42,.55);cursor:pointer}.thread:hover{border-color:rgba(37,99,235,.38)}.thread-top{display:flex;justify-content:space-between;gap:.7rem;margin-bottom:.45rem}.thread-title{font-weight:800}.meta{font-size:.78rem;color:var(--muted);line-height:1.45}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:.2rem .55rem;font-size:.7rem;font-weight:900;border:1px solid transparent}.b-new{background:rgba(37,99,235,.16);color:#60a5fa;border-color:rgba(37,99,235,.28)}.b-waiting_answer{background:rgba(245,158,11,.16);color:#fbbf24;border-color:rgba(245,158,11,.28)}.b-answered{background:rgba(16,185,129,.16);color:#34d399;border-color:rgba(16,185,129,.28)}.b-closed{background:rgba(148,163,184,.16);color:#cbd5e1;border-color:rgba(148,163,184,.22)}.b-high{background:rgba(239,68,68,.16);color:#f87171;border-color:rgba(239,68,68,.3)}.detail{display:none}.detail.active{display:block}.message{padding:.9rem;border-radius:14px;margin:.65rem 0;border:1px solid var(--border);background:rgba(255,255,255,.04)}.message .who{font-weight:800;font-size:.8rem;color:#93c5fd;margin-bottom:.3rem}.empty{padding:2rem;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:18px}.toast{position:fixed;right:1rem;bottom:1rem;background:#0f172a;color:#fff;border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;z-index:6000;box-shadow:0 12px 28px rgba(0,0,0,.35)}@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:1rem}.grid{grid-template-columns:1fr}.page-head{display:block}}
  </style>
  <link rel="stylesheet" href="professional-ui.css"><link rel="stylesheet" href="theme-light.css"><link rel="stylesheet" href="ui-system.css">
</head>
<body>
<div class="app">
  <aside class="sidebar"><div class="sidebar-logo"><img src="assets/logo-code-mark.png" alt="IT School"><span>IT&nbsp;<b>School</b></span></div><nav class="sidebar-nav">
    <a href="dashboard.html">Кабінет</a><a href="courses.html">Курси</a><a href="schedule.html">Розклад</a><a href="grades.html">Оцінки</a><a href="assignments.html">Завдання</a><a href="materials.html">Матеріали</a><a class="active" href="questions.html">Питання</a><a href="profile.html">Профіль</a>
  </nav><div class="sidebar-bottom"><a href="#" onclick="logout();return false;">Вийти</a></div></aside>
  <main class="main">
    <div class="page-head"><div><h1>Питання та звернення</h1><p>Тут можна поставити питання викладачу або адміністратору, переглянути відповіді та історію AI-запитів.</p></div><button class="btn secondary" onclick="loadQuestions()">Оновити</button></div>
    <div class="grid">
      <section class="card"><h2>Нове питання</h2>
        <form id="questionForm">
          <div class="field"><label>Кому адресувати</label><select id="targetType"><option value="teacher">Викладачу по курсу</option><option value="admin">Адміністратору</option></select></div>
          <div class="field" id="courseField"><label>Курс</label><select id="courseSelect"><option value="">Завантаження курсів...</option></select><div class="meta" id="teacherHint"></div></div>
          <div class="field"><label>Категорія</label><select id="category"><option value="learning">Навчальне питання</option><option value="schedule">Розклад</option><option value="access">Доступ до курсу</option><option value="payment">Оплата</option><option value="certificate">Сертифікат</option><option value="other">Інше</option></select></div>
          <div class="field"><label>Тема</label><input id="title" maxlength="180" placeholder="Наприклад: Не відкривається завдання"></div>
          <div class="field"><label>Текст питання</label><textarea id="message" maxlength="3000" placeholder="Опишіть ситуацію максимально зрозуміло..."></textarea></div>
          <div class="field"><label><input id="priority" type="checkbox" style="width:auto;margin-right:.45rem;"> Позначити як важливе</label></div>
          <div class="btn-row"><button class="btn" type="submit">Надіслати питання</button><button class="btn secondary" type="button" onclick="openAiWidget()">Запитати AI</button></div>
        </form>
      </section>
      <section class="card"><h2>Мої питання</h2><div class="tabs"><button class="tab active" data-filter="all">Усі</button><button class="tab" data-filter="new">Нові</button><button class="tab" data-filter="waiting_answer">Очікують</button><button class="tab" data-filter="answered">Відповіли</button><button class="tab" data-filter="ai">AI-запити</button></div><div id="questionsList"></div><div id="questionDetail" class="detail"></div></section>
    </div>
  </main>
</div>
<script src="config.js"></script><script src="mockData.js"></script><script src="api.js"></script>
<script>
if(!requireAuth()) throw new Error('auth');
let courses=[]; let threads=[]; let currentFilter='all'; let teachersByCourse={};
const statusLabels={new:'Нове',waiting_answer:'Очікує відповіді',answered:'Відповідь надано',closed:'Закрито'};
function toast(t){const d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2600)}
async function loadCourses(){
  try{ courses=await apiGet('/api/student/courses')||[]; const sel=document.getElementById('courseSelect'); sel.innerHTML='';
    if(!courses.length){ sel.innerHTML='<option value="">Немає доступних курсів</option>'; return; }
    for(const c of courses){ const id=c.course_id||c.id; const title=c.course_title||c.title; const opt=document.createElement('option'); opt.value=id; opt.textContent=title; sel.appendChild(opt); }
    await updateTeacherHint();
  }catch(e){ document.getElementById('courseSelect').innerHTML='<option value="">Помилка завантаження</option>'; }
}
async function updateTeacherHint(){ const id=document.getElementById('courseSelect').value; const hint=document.getElementById('teacherHint'); if(!id){hint.textContent='';return;} try{ if(!teachersByCourse[id]) teachersByCourse[id]=await apiGet(`/api/courses/${id}/teacher`); const teachers=teachersByCourse[id]?.teachers||[]; hint.textContent=teachers.length?`Питання отримає: ${teachers.map(t=>t.full_name||t.email).join(', ')}`:'Для курсу не знайдено викладача'; }catch{ hint.textContent='Не вдалося визначити викладача'; }}
function typeLabel(t){return t==='teacher'?'Викладач':t==='admin'?'Адміністратор':'AI-асистент'}
function renderList(){ const box=document.getElementById('questionsList'); let rows=threads; if(currentFilter==='ai') rows=rows.filter(x=>x.target_type==='ai'); else if(currentFilter!=='all') rows=rows.filter(x=>x.status===currentFilter); if(!rows.length){box.innerHTML='<div class="empty">Питань у цій вкладці немає.</div>'; return;} box.innerHTML=rows.map(q=>`<div class="thread" onclick="openThread(${q.id})"><div class="thread-top"><div class="thread-title">${escapeHtml(q.title)}</div><span class="badge b-${q.status}">${statusLabels[q.status]||q.status}</span></div><div class="meta">${typeLabel(q.target_type)}${q.course_title?' · '+escapeHtml(q.course_title):''}${q.priority==='high'?' · <span class="badge b-high">Важливе</span>':''}</div><div class="meta">${escapeHtml((q.last_message||'').slice(0,140))}</div></div>`).join(''); }
async function loadQuestions(){ try{ threads=await apiGet('/api/questions/my')||[]; renderList(); }catch(e){document.getElementById('questionsList').innerHTML=`<div class="empty">${escapeHtml(e.message)}</div>`} }
async function openThread(id){ const q=await apiGet(`/api/questions/${id}`); const box=document.getElementById('questionDetail'); box.classList.add('active'); box.innerHTML=`<hr style="border-color:var(--border);margin:1rem 0"><h2>${escapeHtml(q.title)}</h2><div class="meta">${typeLabel(q.target_type)} · ${statusLabels[q.status]||q.status} ${q.course_title?'· '+escapeHtml(q.course_title):''}</div><div style="margin-top:1rem">${(q.messages||[]).map(m=>`<div class="message"><div class="who">${escapeHtml(m.sender_name||m.sender_role)} · ${new Date(m.created_at).toLocaleString('uk-UA')}</div><div>${escapeHtml(m.message_text)}</div></div>`).join('')}</div>${q.target_type!=='ai'&&q.status!=='closed'?`<div class="field"><label>Уточнення / відповідь</label><textarea id="replyText"></textarea></div><div class="btn-row"><button class="btn" onclick="sendReply(${q.id})">Надіслати</button><button class="btn secondary" onclick="closeThread(${q.id})">Закрити</button></div>`:''}`; box.scrollIntoView({behavior:'smooth',block:'nearest'}); }
async function sendReply(id){ const txt=document.getElementById('replyText').value.trim(); if(!txt)return toast('Введіть текст'); await replyQuestion(id,txt); toast('Надіслано'); await loadQuestions(); await openThread(id); }
async function closeThread(id){ await closeQuestion(id); toast('Питання закрито'); await loadQuestions(); document.getElementById('questionDetail').classList.remove('active'); }
function openAiWidget(){ const btn=document.getElementById('ai-chat-toggle'); if(btn) btn.click(); else toast('AI-віджет завантажується. Спробуйте ще раз.'); }
document.getElementById('targetType').addEventListener('change',e=>{document.getElementById('courseField').style.display=e.target.value==='teacher'?'block':'none'});
document.getElementById('courseSelect').addEventListener('change',updateTeacherHint);
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFilter=b.dataset.filter;renderList();}));
document.getElementById('questionForm').addEventListener('submit',async e=>{e.preventDefault(); const payload={target_type:targetType.value,title:title.value.trim(),message:message.value.trim(),category:category.value,priority:priority.checked?'high':'normal'}; if(payload.target_type==='teacher') payload.course_id=Number(courseSelect.value); if(!payload.title||!payload.message)return toast('Заповніть тему і текст'); try{ const created=await createQuestion(payload); toast('Питання надіслано'); e.target.reset(); await loadCourses(); await loadQuestions(); await openThread(created.id); }catch(err){toast(err.message||'Помилка надсилання')}});
loadCourses(); loadQuestions();
</script>
</body></html>
