<!DOCTYPE html>
<html lang="uk">
<head>
    <script>(function(){try{var t=localStorage.getItem('it-school-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo-code-mark-128.png">
    <title>Кабінет — IT School</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Manrope',sans-serif;background:var(--ink);color:#fff;margin:0;}
        .app{display:flex;min-height:100vh;}
        /* Sidebar */
        .sidebar{width:260px;background:var(--ink-soft);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .3s;}
        .sidebar-logo{display:flex;align-items:center;gap:.65rem;padding:1.5rem;border-bottom:1px solid var(--border);}
        .sidebar-logo img{height:32px;}
        .sidebar-logo span{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:-.02em;}
        .sidebar-logo span b{color:#3b82f6;font-weight:900;}
        .sidebar-nav{flex:1;padding:1rem .75rem;overflow-y:auto;}
        .sidebar-nav a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;margin-bottom:.2rem;transition:all .2s;}
        .sidebar-nav a:hover{background:rgba(255,255,255,.05);color:#fff;}
        .sidebar-nav a.active{background:rgba(37,99,235,.12);color:#3b82f6;border:1px solid rgba(37,99,235,.2);}
        .sidebar-nav a svg{flex-shrink:0;opacity:.7;}
        .sidebar-nav a.active svg{opacity:1;}
        .sidebar-bottom{padding:.75rem;border-top:1px solid var(--border);}
        .sidebar-bottom a{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:all .2s;}
        .sidebar-bottom a:hover{background:rgba(239,68,68,.1);color:#ef4444;}
        /* Main */
        .main{flex:1;margin-left:260px;padding:2rem;min-height:100vh;}
        /* Top bar */
        .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
        .topbar-greeting h1{font-family:'Unbounded',sans-serif;font-size:1.5rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.3rem;}
        .topbar-greeting p{color:var(--muted);font-size:.9rem;}
        /* Stat cards */
        .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-bottom:2rem;}
        .stat-card{background:var(--ink-soft);border:1px solid var(--border);border-radius:16px;padding:1.5rem;position:relative;overflow:hidden;transition:all .3s;}
        .stat-card:hover{border-color:rgba(37,99,235,.3);transform:translateY(-2px);}
        .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--line-color,var(--gradient-primary));transition:opacity .3s;}
        .stat-card:hover::before{opacity:1;}
        .stat-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:1rem;font-size:1.2rem;}
        .stat-val{font-family:'Unbounded',sans-serif;font-size:1.8rem;font-weight:900;letter-spacing:-.03em;line-height:1;margin-bottom:.3rem;}
        .stat-lbl{color:var(--muted);font-size:.8rem;font-weight:500;}
        /* Section */
        .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
        .section-head h2{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:-.02em;}
        /* Course cards */
        .courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;margin-bottom:2rem;}
        .course-card{background:var(--ink-soft);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .3s;cursor:pointer;}
        .course-card:hover{border-color:rgba(37,99,235,.35);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
        .course-thumb{height:120px;background:linear-gradient(135deg,#1e2d5e,#2563eb);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:2.5rem;}
        .course-body{padding:1.25rem;}
        .course-title{font-weight:700;font-size:.95rem;margin-bottom:.4rem;}
        .course-desc{color:var(--muted);font-size:.8rem;line-height:1.5;margin-bottom:1rem;}
        .progress-bar{background:rgba(255,255,255,.07);height:5px;border-radius:999px;overflow:hidden;margin-bottom:.4rem;}
        .progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#3b82f6);border-radius:999px;transition:width .5s;}
        .progress-stats{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);}
        /* Notifications */
        .notif-list{display:flex;flex-direction:column;gap:.75rem;}
        .notif-card{background:var(--ink-soft);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;transition:border-color .2s;}
        .notif-card:hover{border-color:rgba(37,99,235,.25);}
        .notif-meta{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:.35rem;}
        .notif-title{font-weight:700;font-size:.9rem;margin-bottom:.25rem;}
        .notif-text{color:var(--muted);font-size:.85rem;line-height:1.55;}
        .tg-btn{display:inline-flex;align-items:center;gap:.6rem;margin-top:1.25rem;padding:.8rem 1.5rem;border-radius:999px;background:linear-gradient(135deg,#229ed9,#0088cc);color:#fff;text-decoration:none;font-weight:700;font-size:.875rem;box-shadow:0 0 20px rgba(34,158,217,.25);transition:all .25s;}
        .tg-btn:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(34,158,217,.4);}
        /* Mobile toggle */
        .mobile-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:300;background:var(--blue);border:none;border-radius:10px;padding:.65rem;cursor:pointer;color:#fff;}
        @media(max-width:1024px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:768px){
            .sidebar{transform:translateX(-100%);}
            .sidebar.active{transform:translateX(0);}
            .main{margin-left:0;padding:1rem;padding-top:4.5rem;}
            .mobile-toggle{display:flex;}
            .stat-grid{grid-template-columns:repeat(2,1fr);}
        }
    </style>
    <link rel="stylesheet" href="professional-ui.css">
    <link rel="stylesheet" href="theme-light.css">
    <script defer src="professional-ui.js"></script>
    <link rel="stylesheet" href="ui-system.css">
</head>
<body>

</button>

<div class="app">

            </a>
        </nav>
        <div class="sidebar-bottom">
            <a href="#" onclick="logout(); return false;">

    <main class="main">

        <!-- Stat cards -->
        <div class="stat-grid">
            <div class="stat-card" id="cardCourses" style="display:none;--line-color:linear-gradient(90deg,#2563eb,#4f46e5);">
                <div class="stat-icon-wrap" style="background:rgba(37,99,235,.12);color:#3b82f6;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                </div>
                <div class="stat-val" id="coursesCount">0</div>
                <div class="stat-lbl">Активні курси</div>
            </div>
            <div class="stat-card" style="--line-color:linear-gradient(90deg,#10b981,#059669);">
                <div class="stat-icon-wrap" style="background:rgba(16,185,129,.12);color:#10b981;">

                </div>
                <div class="stat-val" id="completedCount">0</div>

            </div>
            <div class="stat-card" style="--line-color:linear-gradient(90deg,#f59e0b,#d97706);">
                <div class="stat-icon-wrap" style="background:rgba(245,158,11,.12);color:#f59e0b;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
                </div>

                <div class="stat-lbl">Успішність</div>
            </div>
            <div class="stat-card" style="--line-color:linear-gradient(90deg,#ef4444,#dc2626);">

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div class="stat-val" id="pendingCount">0</div>
                <div class="stat-lbl">Нові завдання</div>

        <!-- My courses -->

    <script>
        document.getElementById('mobileToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
        });
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('mobileToggle');
            if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
                sidebar.classList.remove('active');
            }
        });

        function renderDashboardCourses(courses, progressByCourseId = {}) {
            const container = document.querySelector('.courses-grid');
            container.innerHTML = '';
            if (!courses.length) {
                container.innerHTML = '<div style="grid-column:1/-1;padding:2rem;text-align:center;color:var(--muted);background:var(--ink-soft);border-radius:16px;border:1px solid var(--border);">Ви ще не записані на жоден курс. <a href="courses.html" style="color:#3b82f6;font-weight:600;">Переглянути курси</a></div>';
                return;
            }
            courses.forEach(course => {
                const progress = Math.round(progressByCourseId[course.id] || 0);
                const card = document.createElement('div');
                card.className = 'course-card';
                card.innerHTML = `
                    <div class="course-thumb"></div>
                    <div class="course-body">
                        <div class="course-title">${course.title}</div>
                        <div class="course-desc">${course.description || 'Опис відсутній'}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
                        <div class="progress-stats"><span>${progress}% завершено</span><span>Переглянути</span></div>
                    </div>`;
                card.addEventListener('click', () => { window.location.href = `course-view.html?id=${course.id}`; });
                container.appendChild(card);
            });
        }

        function renderNotifications(notifications) {
            const container = document.getElementById('notificationsList');
            if (!container) return;
            if (!notifications.length) {
                container.innerHTML = '<div style="padding:1rem 0;color:var(--muted);">Наразі немає нових сповіщень.</div>';
                return;
            }
            container.innerHTML = notifications.map(item => `
                <article class="notif-card">
                    <div class="notif-meta"><span>${item.source}</span><span>${item.date}</span></div>
                    <div class="notif-title">${item.title}</div>
                    <div class="notif-text">${item.text}</div>
                </article>`).join('');
        }
    </script>
    <script src="config.js?v=2"></script>
    <script src="mockData.js?v=2"></script>
    <script src="api.js?v=2"></script>
    <script src="script.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!requireAuth()) return;
            showDemoBanner();

            const user = await fetchCurrentUser();
            if (!user) return;

            if (user.role === 'admin')   { window.location.href = 'admin-dashboard.html'; return; }
            if (user.role === 'teacher') { window.location.href = 'teacher-dashboard.html'; return; }

            const nameEl = document.getElementById('greetName');
            if (nameEl) nameEl.textContent = user.full_name.split(' ')[0];

            const countEl = document.getElementById('coursesCount');
            if (countEl) {
                const userGroups = user.groups || user.study_groups || [];
                countEl.textContent = userGroups.length;
                document.getElementById('cardCourses').style.display = 'block';
            }

            let studentCourses = [], assignments = [];
            try {
                studentCourses = await apiGet('/api/student/courses') || [];
                assignments = await apiGet('/api/student/assignments') || [];
            } catch(e) {}

            let totalGrades = 0, sumScores = 0;
            studentCourses.forEach(course => {
                totalGrades += (course.grades_count || course.grades?.length || 0);
                (course.grades || []).forEach(grade => { sumScores += grade.score; });
            });
            const completedCount = totalGrades;
            const avgScore = totalGrades > 0 ? Math.round(sumScores / totalGrades) : 0;
            const pendingCount = assignments.filter(a => a.status === 'pending').length;

            const greetSub = document.getElementById('greetSub');
            if (greetSub) greetSub.textContent = pendingCount > 0
                ? `У вас ${pendingCount} нових завдань.`
                : 'Всі завдання виконані. Чудова робота!';

            document.getElementById('completedCount').textContent = completedCount;
            document.getElementById('avgScore').textContent = avgScore + '%';
            document.getElementById('pendingCount').textContent = pendingCount;

            // Animate counters
            document.querySelectorAll('.stat-val').forEach(stat => {
                const finalValue = stat.textContent;
                const isPercentage = finalValue.includes('%');
                const numericValue = parseInt(finalValue);
                if (!isNaN(numericValue) && numericValue > 0) {
                    let currentValue = 0;
                    const increment = Math.max(numericValue / 50, 0.1);
                    const timer = setInterval(() => {
                        currentValue += increment;
                        if (currentValue >= numericValue) { currentValue = numericValue; clearInterval(timer); }
                        stat.textContent = Math.floor(currentValue) + (isPercentage ? '%' : '');
                    }, 30);
                }
            });

            const courses = await apiGet('/api/courses');
            if (courses) {
                const userGroups = user.groups || user.study_groups || [];
                const enrolledSet = new Set();
                userGroups.forEach(g => {
                    if (Array.isArray(g.courses)) g.courses.forEach(c => { if (c && typeof c.id === 'number') enrolledSet.add(c.id); });
                    if (typeof g.course_id === 'number') enrolledSet.add(g.course_id);
                });
                if (enrolledSet.size === 0 && Array.isArray(studentCourses)) {
                    studentCourses.forEach(sc => { if (typeof sc.course_id === 'number') enrolledSet.add(sc.course_id); });
                }
                const myCoursesData = courses.filter(c => enrolledSet.has(c.id)).slice(0, 3);
                const progressByCourseId = {};
                studentCourses.forEach(course => { progressByCourseId[course.course_id] = course.average_score !== null ? Math.round(course.average_score) : 0; });
                renderDashboardCourses(myCoursesData, progressByCourseId);
            }

            try {
                const notifications = await apiGet('/api/student/notifications') || [];
                renderNotifications(notifications.map(item => ({
                    source: item.sender_name || 'Адміністрація',
                    date: item.timestamp ? new Date(item.timestamp).toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' }) : '—',
                    title: item.title,
                    text: item.message,
                })));
            } catch (error) {
                renderNotifications([
                    { source: 'Адміністрація', date: '21.05.2026', title: 'Оновлено розклад занять', text: 'Перевірте розділ «Розклад», щоб побачити актуальні зміни.' },
                    { source: 'Викладач', date: '20.05.2026', title: 'Нові матеріали до курсу', text: 'Нові матеріали та рекомендації додані на сторінці вашого курсу.' },
                    { source: 'Адміністрація', date: '19.05.2026', title: 'Telegram для сповіщень', text: 'Підключіть Telegram і отримуйте повідомлення швидше.' }
                ]);
            }
        });
    </script>
</body>
</html>
