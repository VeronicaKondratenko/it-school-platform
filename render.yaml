# Render Blueprint for IT School Platform.
# You can deploy manually from the Render Dashboard, or use this Blueprint.
# If a service name is already taken, Render may add a suffix. If that happens,
# update frontend/config.js -> RENDER_BACKEND_URL to the real backend URL.

services:
  - type: web
    name: it-school-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: it-school-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: CORS_ORIGINS
        value: https://it-school-frontend.onrender.com
      # ── Telegram bot ──────────────────────────────────────────────
      # Bot is OFF by default. To enable it RELIABLY on Render free tier,
      # use WEBHOOK mode (polling dies when a free web service sleeps):
      #   ENABLE_BOT=true
      #   BOT_MODE=webhook
      #   TELEGRAM_BOT_TOKEN=<token from @BotFather>
      #   TELEGRAM_WEBHOOK_URL=https://<this-backend-host>.onrender.com/api/webhook/telegram
      #   TELEGRAM_WEBHOOK_SECRET=<any long random string>
      # Set the secret/token in the Render dashboard, NOT in this file.
      - key: ENABLE_BOT
        value: false
      - key: BOT_MODE
        value: disabled
      - key: TELEGRAM_BOT_TOKEN
        value: ""
      - key: TELEGRAM_WEBHOOK_URL
        value: ""
      - key: TELEGRAM_WEBHOOK_SECRET
        value: ""
      - key: GEMINI_API_KEY
        value: ""
      - key: SQL_ECHO
        value: false
      - key: AUTO_CREATE_DB
        value: true

  - type: static
    name: it-school-frontend
    plan: free
    rootDir: frontend
    buildCommand: echo "Static frontend - no build step"
    staticPublishPath: .

databases:
  - name: it-school-db
    plan: free
    databaseName: it_school
    user: it_school_user
